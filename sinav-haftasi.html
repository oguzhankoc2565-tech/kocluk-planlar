<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Sınav Haftası Özel Sayfası</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: light;
      font-family: 'Nunito', system-ui, sans-serif;
      background: #fdf2f8;
      color: #111827;
      --surface: #ffffff;
      --surface-soft: #f8fafc;
      --surface-glow: rgba(59, 130, 246, .12);
      --border: rgba(148, 163, 184, .18);
      --accent: #7c3aed;
      --accent-soft: #eef2ff;
      --success: #14b8a6;
      --warning: #f59e0b;
      --danger: #ef4444;
      --text-muted: #475569;
      --radius: 28px;
      --radius-sm: 18px;
      --shadow: 0 28px 70px rgba(15, 23, 42, .12);
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; }
    body { background: radial-gradient(circle at top left, rgba(236, 72, 153, .12), transparent 22%), linear-gradient(180deg, #fdf2f8 0%, #eff6ff 48%, #ffffff 100%); }
    body::before { content: ''; position: fixed; inset: 0; background-image: linear-gradient(135deg, rgba(59, 130, 246, .05) 0%, transparent 30%), radial-gradient(circle at 20% 20%, rgba(249, 115, 22, .08) 0%, transparent 12%), radial-gradient(circle at 85% 10%, rgba(236, 72, 153, .1) 0%, transparent 16%); pointer-events: none; }
    a { color: inherit; text-decoration: none; }
    button { font: inherit; }
    .page { width: min(1180px, calc(100% - 36px)); margin: 0 auto; padding: 24px 0 64px; position: relative; z-index: 1; }
    .topbar { display: flex; flex-wrap: wrap; align-items: center; gap: 14px; margin-bottom: 18px; }
    .topbar-title { font-size: 1.05rem; font-weight: 800; letter-spacing: -0.03em; color: #7c3aed; }
    .topbar-subtitle { color: #9333ea; font-size: 0.95rem; }
    .topbar-link { margin-left: auto; display: inline-flex; align-items: center; gap: 8px; padding: 12px 18px; background: linear-gradient(135deg, #6d28d9, #22d3ee); color: #fff; border-radius: 999px; box-shadow: 0 20px 40px rgba(59, 130, 246, .18); transition: transform .18s ease; }
    .topbar-link:hover { transform: translateY(-2px); }
    .hero { position: relative; overflow: hidden; background: linear-gradient(135deg, #fff7ed 0%, #ede9fe 45%, #ecfeff 100%); border: 1px solid rgba(167, 139, 250, .18); border-radius: 34px; box-shadow: 0 35px 90px rgba(124, 58, 237, .12); padding: 34px 36px; display: grid; gap: 22px; }
    .hero::before, .hero::after { content: ''; position: absolute; border-radius: 50%; opacity: .38; }
    .hero::before { width: 160px; height: 160px; top: -40px; right: -40px; background: radial-gradient(circle, rgba(59,130,246,.35), transparent 65%); }
    .hero::after { width: 220px; height: 220px; bottom: -80px; left: -90px; background: radial-gradient(circle, rgba(236,72,153,.25), transparent 62%); }
    .hero-flag { display: inline-flex; align-items: center; gap: 10px; background: rgba(236, 72, 153, .15); color: #9d174d; border-radius: 999px; padding: 11px 16px; font-weight: 800; font-size: 0.95rem; width: fit-content; z-index: 1; }
    .hero-title { position: relative; z-index: 1; margin: 0; font-size: clamp(2rem, 4vw, 3.5rem); line-height: 1.02; letter-spacing: -0.05em; color: #312e81; }
    .hero-copy { position: relative; z-index: 1; font-size: 1rem; line-height: 1.75; color: #475569; max-width: 720px; }
    .hero-pills { display: flex; flex-wrap: wrap; gap: 10px; z-index: 1; }
    .hero-pill { display: inline-flex; align-items: center; gap: 8px; padding: 10px 14px; border-radius: 999px; background: rgba(79, 70, 229, .1); color: #4338ca; font-size: 0.92rem; font-weight: 700; }
    .hero-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 18px; margin-top: 8px; z-index: 1; }
    .hero-card { border-radius: 26px; padding: 22px; background: rgba(255,255,255,.94); border: 1px solid rgba(255,255,255,.9); box-shadow: 0 22px 45px rgba(15, 23, 42, .08); display: grid; gap: 10px; }
    .hero-card strong { display: block; font-size: 0.9rem; color: #7c3aed; text-transform: uppercase; letter-spacing: .08em; }
    .hero-card span { display: block; font-size: 1.25rem; font-weight: 800; line-height: 1.1; color: #111827; }
    .hero-card small { color: #6b7280; font-size: .95rem; line-height: 1.55; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 18px; margin-top: 18px; }
    .card { background: #fff; border: 1px solid rgba(148, 163, 184, .18); border-radius: 30px; padding: 24px; box-shadow: 0 20px 48px rgba(15, 23, 42, .08); }
    .card h2 { margin: 0 0 12px; font-size: 1.3rem; line-height: 1.2; color: #111827; }
    .card p { margin: 0; color: #475569; line-height: 1.75; }
    .stat-block { display: grid; gap: 10px; padding: 18px; border-radius: 24px; background: linear-gradient(145deg, rgba(59, 130, 246, .09), rgba(124, 58, 237, .08)); }
    .stat-title { font-size: .92rem; font-weight: 700; color: #4338ca; }
    .stat-value { font-size: 2rem; font-weight: 800; color: #111827; }
    .stat-caption { color: #475569; font-size: .95rem; }
    .resource-list, .plan-list, .checklist-list { list-style: none; padding: 0; margin: 0; display: grid; gap: 12px; }
    .resource-item, .plan-item, .checklist-item { position: relative; background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%); border-radius: 22px; padding: 18px 20px; display: flex; align-items: center; justify-content: space-between; gap: 14px; border: 1px solid rgba(148, 163, 184, .18); transition: transform .18s ease, border-color .18s ease, box-shadow .18s ease; }
    .resource-item:hover, .plan-item:hover, .checklist-item:hover { transform: translateY(-2px); border-color: rgba(59, 130, 246, .28); box-shadow: 0 18px 35px rgba(59, 130, 246, .1); }
    .resource-left { display: grid; gap: 4px; min-width: 0; }
    .resource-label { font-weight: 800; font-size: 1rem; color: #111827; }
    .resource-meta { color: #64748b; font-size: .95rem; line-height: 1.5; }
    .resource-link { color: #4338ca; font-weight: 700; white-space: nowrap; }
    .plan-item .resource-label, .checklist-item .resource-label { font-size: 1rem; }
    .pill { display: inline-flex; align-items: center; gap: 8px; background: rgba(236, 72, 153, .12); color: #be185d; border-radius: 999px; padding: 8px 12px; font-size: .82rem; font-weight: 700; }
    .pill.green { background: rgba(5, 150, 105, .12); color: #047857; }
    .pill.blue { background: rgba(59, 130, 246, .12); color: #1d4ed8; }
    .tip-card { display: flex; flex-direction: column; gap: 14px; }
    .tip-card strong { font-size: 1.05rem; color: #7c3aed; }
    .tip-list { list-style: none; padding-left: 0; margin: 0; display: grid; gap: 10px; }
    .tip-item { display: flex; align-items: flex-start; gap: 10px; background: rgba(249, 115, 22, .08); border: 1px solid rgba(249, 115, 22, .15); border-radius: 18px; padding: 14px 16px; color: #92400e; font-size: .95rem; }
    .tip-item::before { content: '⚡'; display: inline-flex; align-items: center; justify-content: center; margin-top: 2px; }
    .info-panel { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; margin-top: 18px; }
    .info-panel .card { min-height: 180px; }
    .footer { margin-top: 32px; color: #475569; font-size: .95rem; display: grid; gap: 10px; }
    .hint { display: inline-flex; flex-wrap: wrap; align-items: center; gap: 10px; background: rgba(59, 130, 246, .08); border: 1px solid rgba(59, 130, 246, .16); padding: 16px 18px; border-radius: 20px; color: #1d4ed8; }
    .loading, .error-box { min-height: 240px; display: grid; place-items: center; background: #fff; border: 1px solid rgba(148, 163, 184, .18); border-radius: 28px; box-shadow: 0 18px 40px rgba(15, 23, 42, .08); padding: 24px; color: #475569; }
    .error-title { font-size: 1.2rem; font-weight: 700; margin-bottom: 10px; }
    .sparkle { position: absolute; width: 14px; height: 14px; border-radius: 999px; background: rgba(249, 115, 22, .95); box-shadow: 0 0 12px rgba(249, 115, 22, .35); animation: float 5s ease-in-out infinite alternate; }
    .sparkle:nth-child(1) { top: 18%; left: 12%; animation-delay: 0s; }
    .sparkle:nth-child(2) { top: 10%; right: 20%; background: rgba(59, 130, 246, .95); animation-delay: 1.2s; }
    .sparkle:nth-child(3) { bottom: 18%; left: 18%; background: rgba(236, 72, 153, .95); animation-delay: 0.6s; }
    .sparkle:nth-child(4) { bottom: 14%; right: 16%; background: rgba(16, 185, 129, .95); animation-delay: 1.8s; }
    @keyframes float { to { transform: translateY(-12px); opacity: .75; } }
    @media (max-width: 980px) { .hero-grid, .grid-3, .info-panel { grid-template-columns: 1fr; } .topbar-link { margin-left: 0; } }
    @media (max-width: 680px) { .page { width: calc(100% - 24px); padding: 16px 0 48px; } .hero { padding: 22px; } .hero-title { font-size: 2.2rem; } }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div>
        <div class="topbar-title">🎉 Sınav Haftası Özel Sayfası</div>
        <div class="topbar-subtitle">Renkli, canlı ve çok daha eğlenceli bir sınav haftası deneyimi.</div>
      </div>
      <a class="topbar-link" href="sablon.html?ogrenci=yakup">🔙 Haftalık şablona dön</a>
    </div>
    <div id="main-content">
      <div class="loading" id="loading">Veriler yükleniyor…</div>
    </div>
  </div>
  <script>
    const API_URL_DEFAULT = 'https://script.google.com/macros/s/AKfycbyUvFShqvwvwOlJmVSY8TQFmYoXCqcfu4JFrK3KtzIVMHN9YctZmRpyrfK5AydUNcPd/exec';
    const RESOURCES = [
      { label: 'Zamirler Konu Testi 1', file: 'Zamirler-Konu-Testi-1.pdf' },
      { label: 'Zamirler Konu Testi 2', file: 'Zamirler-Konu-Testi-2.pdf' },
      { label: 'Zamirler Konu Testi 3', file: 'Zamirler-Konu-Testi-3.pdf' },
      { label: 'ZAMİRLER -1', file: 'ZAMİRLER -1.pdf' },
      { label: 'İsimler Konu Testi 2', file: 'Isimler-Konu-Testi-2.pdf' },
      { label: 'İsimler Konu Testi 3', file: 'Isimler-Konu-Testi-3.pdf' },
      { label: '6. Sınıf Ses Bilgisi Testi', file: '6. Sınıf Ses Bilgisi Testi-1 (Turkcen Serisi).pdf' },
      { label: '6. Sınıf Sıfatlar Fasikülü', file: '6.Sınıf Sıfatlar Fasikülü.pdf' },
      { label: 'Fen 2. Dönem Yazılı', file: '6_Fen_2.Donem_2. Yazili (1).pdf' },
      { label: '6 İsimler Dokümanı', file: '6 İSİMLER.docx' }
    ];
    const EXAM_TIPS = [
      'Önce en zor konuyu seç, sonra daha kolaylarına geç. Beyin sabah daha taze çalışır.',
      'Soru çözerken işaretlemeyi unutma: yanlış olanları tekrar gör, doğruları pekiştir.',
      'Her testin sonunda 3 ana hata türünü yaz: dikkat, konu, zaman yönetimi.',
      'Her gün 10 dakika kendi sesini duyur. Okuduğunu anlamak hızını artırır.'
    ];
    const CHECKPOINTS = [
      'Bugün 2 kısa test çöz ve süreni not et.',
      'Soru bankasından 1 konu tekrar yap.',
      'Önceki denemeden bir hatanı seç ve çözümünü yaz.',
      'Gece çantanı hazırla: kalem, silgi, su, kimlik.',
      'Sınavdan önce 5 dakika derin nefes al, rahatla.'
    ];
    const GUN_JS = { 'Pazar':0, 'Pazartesi':1, 'Salı':2, 'Çarşamba':3, 'Perşembe':4, 'Cuma':5, 'Cumartesi':6 };
    const params = new URLSearchParams(location.search);
    const slug = (params.get('ogrenci') || '').trim().toLowerCase();
    const hafta = (params.get('hafta') || '').trim();
    const apiOverride = (params.get('api') || '').trim();
    const API_URL = apiOverride || API_URL_DEFAULT;

    const main = document.getElementById('main-content');
    const loading = document.getElementById('loading');

    function showError(title, message) {
      main.innerHTML = `<div class="error-box"><div class="error-title">${title}</div><div>${message}</div></div>`;
    }

    function setLoading(text) {
      if (loading) loading.textContent = text;
    }

    if (!slug) {
      showError('Öğrenci belirtilmedi', 'URL sonuna ?ogrenci=slug eklemeniz gerekiyor. Örneğin: sinav-haftasi.html?ogrenci=yakup');
    } else {
      loadStudent();
    }

    function loadStudent() {
      setLoading('Öğrenci verisi alınıyor...');
      const sep = API_URL.indexOf('?') >= 0 ? '&' : '?';
      let url = API_URL + sep + 'istek=ogrenciSayfasi&ogrenci=' + encodeURIComponent(slug);
      if (hafta) url += '&hafta=' + encodeURIComponent(hafta);
      fetch(url)
        .then(res => { if (!res.ok) throw new Error('HTTP ' + res.status); return res.text(); })
        .then(text => JSON.parse(text))
        .then(data => {
          if (data.durum && data.durum !== 'basarili') throw new Error(data.mesaj || 'Sunucu hatası');
          if (!data.ogrenci || !data.hafta) throw new Error('Eksik veri: ogrenci veya hafta bilgisi.');
          renderStudent(buildConfig(data));
        })
        .catch(err => {
          showError('Veri yüklenemedi', err.message || 'Sunucuya bağlanırken sorun oluştu.');
          console.error(err);
        });
    }

    function parseDate(value) {
      if (!value) return null;
      const m = String(value).match(/^(\d{4})-(\d{2})-(\d{2})/);
      if (!m) return null;
      return new Date(Number(m[1]), Number(m[2]) - 1, Number(m[3]));
    }

    function buildConfig(data) {
      const o = data.ogrenci || {};
      const h = data.hafta || {};
      const netler = data.netler || {};
      const baslangic = parseDate(h.baslangic_tarih);
      const baslangicGun = baslangic ? baslangic.getDay() : 1;
      const gunler = [];
      Object.keys(data.gunler || {}).forEach(gunAd => {
        const raw = Array.isArray(data.gunler[gunAd]) ? data.gunler[gunAd] : [];
        if (!raw.length || GUN_JS[gunAd] === undefined) return;
        const sirali = raw.slice().sort((a,b) => (a.sira || 0) - (b.sira || 0));
        const dersler = [];
        let current = null;
        sirali.forEach(row => {
          const kod = row.ders_kod || 'kit';
          if (!current || current._kod !== kod) {
            if (current) { delete current._kod; dersler.push(current); }
            current = {
              _kod: kod,
              cls: 'ders-' + kod,
              ad: row.ders_baslik || kod,
              takipKey: kod === 'kit' ? null : kod,
              gorevler: []
            };
          }
          const gorev = { metin: row.gorev_metin || '' };
          if (row.checkbox_mu) gorev.checkbox = true;
          if (row.konu) gorev.konu = row.konu;
          if (row.kazanim_kodlar) gorev.kazanimKodlar = row.kazanim_kodlar;
          current.gorevler.push(gorev);
        });
        if (current) { delete current._kod; dersler.push(current); }
        let tarih = null;
        if (baslangic) {
          const offset = (GUN_JS[gunAd] - baslangicGun + 7) % 7;
          tarih = new Date(baslangic);
          tarih.setDate(baslangic.getDate() + offset);
        }
        gunler.push({ ad: gunAd, tarih, dersler });
      });
      gunler.sort((a,b) => (GUN_JS[a.ad] || 0) - (GUN_JS[b.ad] || 0));
      return {
        ogrenci: {
          ad: o.ad || '',
          sinif: o.sinif || '',
          haftaNo: String(o.aktif_hafta != null ? o.aktif_hafta : (h.no || '')),
          tarihAralik: h.tarih_aralik || '',
          rozetler: Array.isArray(o.rozetler) ? o.rozetler : [],
          ekstraBaslik: o.sayfa_baslik || ''
        },
        durum: {
          sonPuan: h.son_puan,
          ortalama: h.ortalama,
          hedef: h.hedef,
          gelisim: h.koc_haftalik_not ? h.koc_haftalik_not : '',
          netler: {
            tur: netler.tur || null,
            sos: netler.sos || null,
            din: netler.din || null,
            ing: netler.ing || null,
            mat: netler.mat || null,
            fen: netler.fen || null
          }
        },
        hedefler: {
          paragraf: h.paragraf_hedef || '',
          kitap: h.kitap_hedef || '',
          gunlukSoru: (h.gunluk_soru_min != null && h.gunluk_soru_max != null)
            ? `${h.gunluk_soru_min}–${h.gunluk_soru_max} soru / gün` : '',
          odak: h.odak || ''
        },
        koc: {
          degerlendirme: h.koc_degerlendirme || '',
          haftalikNot: h.koc_haftalik_not || ''
        },
        gunler,
        _meta: { ham: data }
      };
    }

    function safeHTML(value) {
      const div = document.createElement('div');
      div.textContent = value || '';
      return div.innerHTML;
    }

    function buildResourceUrl(filename) {
      return 'sinav-haftasi/' + encodeURIComponent(filename);
    }

    function getCurrentDayName() {
      const today = new Date();
      return Object.keys(GUN_JS).find(key => GUN_JS[key] === today.getDay()) || '';
    }

    function findTodayTasks(cfg) {
      const todayName = getCurrentDayName();
      const todayEntry = cfg.gunler.find(g => g.ad === todayName);
      return todayEntry || cfg.gunler[0] || null;
    }

    function renderStudent(cfg) {
      document.title = `Sınav Haftası · ${cfg.ogrenci.ad}`;
      const today = findTodayTasks(cfg);
      const selectedTip = EXAM_TIPS[Math.floor(Math.random() * EXAM_TIPS.length)];
      const resourceHtml = RESOURCES.map(item => `
        <li class="resource-item">
          <div class="resource-left">
            <div class="resource-label">${safeHTML(item.label)}</div>
            <div class="resource-meta">📄 Kaynak dosya</div>
          </div>
          <a class="resource-link" href="${buildResourceUrl(item.file)}" target="_blank" rel="noreferrer noopener">Aç / İndir</a>
        </li>`).join('');
      const todayTasksHtml = today && today.dersler.length > 0
        ? today.dersler.map(ders => `
            <li class="plan-item">
              <div class="resource-left">
                <div class="resource-label">${safeHTML(ders.ad)}</div>
                <div class="resource-meta">${ders.gorevler.map(g => safeHTML(g.metin)).filter(Boolean).join(' · ')}</div>
              </div>
              <span class="pill green">${ders.gorevler.length} görev</span>
            </li>`).join('')
        : '<li class="plan-item"><div class="resource-left"><div class="resource-label">Bugün için bir görev bulunamadı.</div><div class="resource-meta">Haftalık plandaki ilk günün görevlerini inceleyin.</div></div></li>';
      const checklistHtml = CHECKPOINTS.map(item => `<li class="checklist-item"><span class="pill blue">✅</span>${safeHTML(item)}</li>`).join('');
      const rozetlerHtml = (cfg.ogrenci.rozetler || []).map(pair => `<span class="hero-pill">${safeHTML(pair[0])}</span>`).join('');
      main.innerHTML = `
        <div class="hero">
          <div class="sparkle"></div>
          <div class="sparkle"></div>
          <div class="sparkle"></div>
          <div class="sparkle"></div>
          <div class="hero-flag">🚀 Sınav Haftası</div>
          <h1 class="hero-title">Merhaba ${safeHTML(cfg.ogrenci.ad)}!</h1>
          <p class="hero-copy">Bu hafta senin için özel: soru çözerken hızlan, hatalarda güçlen ve sınavda kapıyı sallayacak enerjiyle gir. Her gün bir küçük başarı senin büyük başarına dönüşsün!</p>
          <div class="hero-pills">${rozetlerHtml || '<span class="hero-pill">Bu hafta senin haftan</span>'}</div>
          <div class="hero-grid">
            <div class="hero-card">
              <strong>👑 Sınıf / Hafta</strong>
              <span>${safeHTML(cfg.ogrenci.sinif || '6. sınıf')}</span>
              <small>Hafta ${safeHTML(cfg.ogrenci.haftaNo)} · ${safeHTML(cfg.ogrenci.tarihAralik)}</small>
            </div>
            <div class="hero-card">
              <strong>🎯 Bugünün odağı</strong>
              <span>${safeHTML(cfg.hedefler.odak || 'Hızlı tekrar')}</span>
              <small>Bugün planını buna göre ayarla.</small>
            </div>
            <div class="hero-card">
              <strong>📚 Günlük hedef</strong>
              <span>${safeHTML(cfg.hedefler.gunlukSoru || 'Soru hedefi')}</span>
              <small>Her soru seni daha güçlü yapar.</small>
            </div>
            <div class="hero-card">
              <strong>💡 Bugünün sürprizi</strong>
              <span>${safeHTML(selectedTip)}</span>
            </div>
          </div>
        </div>
        <div class="grid-3">
          <div class="card">
            <h2>✨ Haftanın güç kartı</h2>
            <p>Bugün çöz, hata yap, öğren. Sınav haftası başarıları rastlantı değil; doğru adımla gelir.</p>
            <div class="stat-block"><div class="stat-title">Deneme puan</div><div class="stat-value">${cfg.durum.sonPuan != null ? safeHTML(String(cfg.durum.sonPuan)) : '—'}</div><div class="stat-caption">Son denemeden gelen puan</div></div>
            <div class="stat-block"><div class="stat-title">Ortalama puan</div><div class="stat-value">${cfg.durum.ortalama != null ? safeHTML(String(cfg.durum.ortalama)) : '—'}</div><div class="stat-caption">Geçen denemelere göre</div></div>
            <div class="stat-block"><div class="stat-title">Hedef puan</div><div class="stat-value">${cfg.durum.hedef != null ? safeHTML(String(cfg.durum.hedef)) : '—'}</div><div class="stat-caption">Hedefe doğru rota</div></div>
          </div>
          <div class="card tip-card">
