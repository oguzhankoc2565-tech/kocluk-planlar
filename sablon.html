// ═══════════════════════════════════════════════════════════════════

function hedefBarHTML(prefix) {
  return `<div class="hedef-bar-wrap" id="${prefix}_hedefbar_wrap">` +
    `<div class="hedef-bar-baslik"><div class="hedef-bar-label">🎯 Günlük Hedef</div><div class="hedef-bar-sayac"><span class="cur" id="${prefix}_hb_sayac">0</span> / ${CONFIG.gunlukSoruHedefi.min}–${CONFIG.gunlukSoruHedefi.max} soru</div></div>` +
    `<div class="hedef-bar-track"><div class="hedef-bar-fill" id="${prefix}_hb_fill"></div></div>` +
    `<div class="hedef-bar-mesaj basla" id="${prefix}_hb_mesaj">Bugünkü çalışmana başla!</div>` +
  `</div>`;
}

function hedefBarGuncelle(prefix) {
  const gun = GUNLER.find(g => g.prefix === prefix); if (!gun) return;
  let toplam = 0;
  gun.dersler.forEach(d => {
    if (!d.takipKey) return;
    toplam += parseInt(val(prefix+'_'+d.takipKey+'_d'))||0;
    toplam += parseInt(val(prefix+'_'+d.takipKey+'_y'))||0;
    toplam += parseInt(val(prefix+'_'+d.takipKey+'_b'))||0;
  });
  const sayacEl = $(prefix+'_hb_sayac'), fillEl = $(prefix+'_hb_fill'), mesajEl = $(prefix+'_hb_mesaj');
  if (!sayacEl || !fillEl || !mesajEl) return;
  sayacEl.textContent = toplam;
  const min = CONFIG.gunlukSoruHedefi.min, max = CONFIG.gunlukSoruHedefi.max;
  fillEl.style.width = Math.min(toplam/max*100, 100) + '%';
  fillEl.classList.remove('basarili','cokustun'); mesajEl.classList.remove('basla','devam','basarili','cokustun');
  if (toplam === 0)     { mesajEl.textContent = 'Bugünkü çalışmana başla!'; mesajEl.classList.add('basla'); }
  else if (toplam < min){ mesajEl.textContent = `Hedefe ${min-toplam} soru kaldı, devam!`; mesajEl.classList.add('devam'); }
  else if (toplam <= max){ mesajEl.textContent = '🎉 Günlük hedefe ulaştın! Süpersin!'; mesajEl.classList.add('basarili'); fillEl.classList.add('basarili'); }
  else                  { mesajEl.textContent = '🔥 Hedefi aştın! Bugün canavarsın!'; mesajEl.classList.add('cokustun'); fillEl.classList.add('cokustun'); }
}

// ═══════════════════════════════════════════════════════════════════
//  PULL-TO-REFRESH (mobil)
// ═══════════════════════════════════════════════════════════════════

(function initPullToRefresh() {
  const PR_THRESHOLD = 80;
  let startY = 0, pulling = false, refreshing = false;

  document.addEventListener('touchstart', e => {
    if (window.scrollY === 0 && !refreshing) { startY = e.touches[0].clientY; pulling = true; }
  }, { passive: true });

  document.addEventListener('touchend', e => {
    if (!pulling) return;
    pulling = false;
    const dist = e.changedTouches[0].clientY - startY;
    if (dist > PR_THRESHOLD && !refreshing) {
      refreshing = true;
      const ind = $('pr-indicator');
      if (ind) ind.style.display = 'block';
      yukleOzet();
      // Deneme verisini de zorla yenile
      denemeYukle(true);
      setTimeout(() => { if (ind) ind.style.display = 'none'; refreshing = false; }, 2000);
    }
  }, { passive: true });
}());

// ═══════════════════════════════════════════════════════════════════
//  DENEME SONUÇLARI MODÜLÜ
// ═══════════════════════════════════════════════════════════════════

const DENEME_CACHE_KEY = 'lgs_deneme_' + OGRENCI_ADI.replace(/\s+/g, '_');
const DENEME_CACHE_GUN_KEY = DENEME_CACHE_KEY + '_gun';

function bugunStr() {
  const d = trSaati();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function denemeCacheOku() {
  try {
    const gun = LS.get(DENEME_CACHE_GUN_KEY);
    const veri = LS.get(DENEME_CACHE_KEY);
    if (gun === bugunStr() && veri) return JSON.parse(veri);
  } catch (e) {}
  return null;
}

function denemeCacheYaz(veri) {
  try {
    LS.set(DENEME_CACHE_KEY, JSON.stringify(veri));
    LS.set(DENEME_CACHE_GUN_KEY, bugunStr());
  } catch (e) {}
}

function denemeYukle(zorla) {
  if (!zorla) {
    const cache = denemeCacheOku();
    if (cache) { denemeRender(cache); return Promise.resolve(cache); }
  }
  const url = SCRIPT_URL + '?tip=denemeler&ogrenciAdi=' + encodeURIComponent(OGRENCI_ADI);
  return fetch(url)
    .then(r => r.json())
    .then(data => {
      if (data.durum !== 'basarili') throw new Error(data.mesaj || 'Veri alınamadı');
      denemeCacheYaz(data);
      denemeRender(data);
      return data;
    })
    .catch(err => {
      warn('Deneme yükleme hatası:', err);
      const el = $('deneme-icerik');
      if (el) el.innerHTML = '<div class="deneme-yukleniyor" style="color:var(--danger)">⚠️ Veri alınamadı: ' + esc(err.message) + '</div>';
    });
}

function denemeOzetUfak(ozet) {
  if (!ozet || !ozet.toplam) return '—';
  return ozet.toplam + ' deneme · <strong>' + Math.round(ozet.sonPuan) + '</strong>';
}

function denemeRender(data) {
  const el = $('deneme-icerik'); if (!el) return;
  const denemeler = data.denemeler || [];
  const ozet = data.ozet || {};
  const ozetEl = $('deneme-acc-ozet');
  if (ozetEl) ozetEl.innerHTML = denemeOzetUfak(ozet);

  if (!denemeler.length) {
    el.innerHTML = '<div class="deneme-yukleniyor">Henüz deneme kaydı yok.</div>';
    return;
  }

  const hedef = CONFIG.durum.hedef;

  let html = '<div class="deneme-ozet-grid">' +
    `<div class="deneme-ozet-kart"><div class="deneme-ozet-val" style="color:var(--mat)">${Math.round(ozet.sonPuan)}</div><div class="deneme-ozet-lbl">Son puan</div></div>` +
    `<div class="deneme-ozet-kart"><div class="deneme-ozet-val" style="color:#7c3aed">${Math.round(ozet.ortalama)}</div><div class="deneme-ozet-lbl">Ortalama</div></div>` +
    `<div class="deneme-ozet-kart"><div class="deneme-ozet-val" style="color:var(--success)">${hedef}</div><div class="deneme-ozet-lbl">Hedef</div></div>` +
    `<div class="deneme-ozet-kart"><div class="deneme-ozet-val" style="color:var(--text)">${ozet.toplam}</div><div class="deneme-ozet-lbl">Deneme</div></div>` +
    '</div>';

  html += denemeSVGGrafik(denemeler, hedef);
  html += denemeTabloHTML(denemeler);

  el.innerHTML = html;
}

function denemeSVGGrafik(denemeler, hedef) {
  const W = 700, H = 280, padL = 45, padR = 20, padT = 20, padB = 50;
  const innerW = W - padL - padR;
  const innerH = H - padT - padB;

  const puanlar = denemeler.map(d => d.puan).filter(p => p > 0);
  if (!puanlar.length) return '';

  const minP = Math.min(Math.min.apply(null, puanlar), hedef) - 30;
  const maxP = Math.max(Math.max.apply(null, puanlar), hedef) + 30;
  const minY = Math.floor(minP / 20) * 20;
  const maxY = Math.ceil(maxP / 20) * 20;
  const rangeY = maxY - minY;

  const xFor = (i) => padL + (denemeler.length === 1 ? innerW/2 : (i / (denemeler.length - 1)) * innerW);
  const yFor = (p) => padT + innerH - ((p - minY) / rangeY) * innerH;

  const yLabels = [];
  const step = Math.max(20, Math.ceil(rangeY / 4 / 20) * 20);
  for (let v = minY; v <= maxY; v += step) yLabels.push(v);

  let svg = `<div class="deneme-grafik-wrap">` +
    `<div class="deneme-grafik-baslik">📈 Puan Trendi` +
      `<div class="deneme-grafik-legend">` +
        `<span><i style="background:var(--mat)"></i>Puan</span>` +
        `<span><i style="background:transparent;border-top:2px dashed var(--success);height:0"></i>Hedef (${hedef})</span>` +
      `</div>` +
    `</div>` +
    `<svg class="deneme-svg" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">`;

  yLabels.forEach(v => {
    const y = yFor(v);
    svg += `<line x1="${padL}" y1="${y}" x2="${W-padR}" y2="${y}" stroke="var(--border)" stroke-width="1" opacity="0.5"/>`;
    svg += `<text x="${padL-8}" y="${y+4}" text-anchor="end" fill="var(--muted)" font-size="11" font-family="Nunito,sans-serif" font-weight="600">${v}</text>`;
  });

  const hedefY = yFor(hedef);
  svg += `<line x1="${padL}" y1="${hedefY}" x2="${W-padR}" y2="${hedefY}" stroke="var(--success)" stroke-width="2" stroke-dasharray="6,4"/>`;

  svg += `<defs><linearGradient id="deneme-grad" x1="0" y1="0" x2="0" y2="1">` +
    `<stop offset="0%" stop-color="var(--mat)" stop-opacity="0.25"/>` +
    `<stop offset="100%" stop-color="var(--mat)" stop-opacity="0"/>` +
    `</linearGradient></defs>`;

  // Polyline noktaları
  const polyPoints = denemeler.map((d, i) => xFor(i) + ',' + yFor(d.puan)).join(' ');

  // Alan polygon
  const ilkX = xFor(0), sonX = xFor(denemeler.length - 1), altY = yFor(minY);
  let alanPoints = ilkX + ',' + altY + ' ';
  denemeler.forEach((d, i) => { alanPoints += xFor(i) + ',' + yFor(d.puan) + ' '; });
  alanPoints += sonX + ',' + altY;
  svg += `<polygon points="${alanPoints}" fill="url(#deneme-grad)"/>`;

  svg += `<polyline points="${polyPoints}" fill="none" stroke="var(--mat)" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"/>`;

  denemeler.forEach((d, i) => {
    const x = xFor(i), y = yFor(d.puan);
    const renk = d.puan >= hedef ? 'var(--success)' : 'var(--danger)';
    svg += `<circle cx="${x}" cy="${y}" r="5" fill="${renk}" stroke="white" stroke-width="2"/>`;

    let kisa = d.ad;
    if (kisa.length > 10) kisa = kisa.substring(0, 9) + '…';
    svg += `<text x="${x}" y="${H-padB+18}" text-anchor="middle" fill="var(--muted)" font-size="10" font-family="Nunito,sans-serif" font-weight="700">${esc(kisa)}</text>`;
    svg += `<text x="${x}" y="${H-padB+32}" text-anchor="middle" fill="var(--muted)" font-size="9" font-family="Nunito,sans-serif" font-weight="600" opacity="0.7">${esc(d.tarih)}</text>`;
  });

  svg += `</svg></div>`;
  return svg;
}

function denemeTabloHTML(denemeler) {
  const dersler = [
    { k: 'tur', ad: 'TÜR', renk: '#9333ea' },
    { k: 'sos', ad: 'SOS', renk: '#0891b2' },
    { k: 'din', ad: 'DİN', renk: '#be185d' },
    { k: 'ing', ad: 'İNG', renk: '#d97706' },
    { k: 'mat', ad: 'MAT', renk: '#2563eb' },
    { k: 'fen', ad: 'FEN', renk: '#16a34a' },
  ];

  let html = '<div class="deneme-tablo-wrap"><table class="deneme-tablo">' +
    '<thead><tr><th>Deneme</th><th>Tarih</th>';
  dersler.forEach(d => { html += `<th style="color:${d.renk}">${d.ad}</th>`; });
  html += '<th style="color:var(--mat)">Puan</th><th>±</th></tr></thead><tbody>';

  denemeler.forEach((d, i) => {
    const oncekiPuan = i > 0 ? denemeler[i-1].puan : null;
    let farkHtml = '—';
    if (oncekiPuan !== null && oncekiPuan > 0 && d.puan > 0) {
      const fark = d.puan - oncekiPuan;
      const farkAbs = Math.abs(fark).toFixed(0);
      if (fark > 0.5)       farkHtml = `<span class="deneme-fark-yukari">▲${farkAbs}</span>`;
      else if (fark < -0.5) farkHtml = `<span class="deneme-fark-asagi">▼${farkAbs}</span>`;
      else                  farkHtml = `<span class="deneme-fark-ayni">→0</span>`;
    }

    const puanCls = d.puan >= CONFIG.durum.hedef ? 'deneme-puan-yuksek' : 'deneme-puan-dusuk';

    html += `<tr><td>${esc(d.ad)}</td><td style="color:var(--muted);font-weight:600">${esc(d.tarih)}</td>`;
    dersler.forEach(ders => {
      const v = d[ders.k];
      html += `<td style="color:${ders.renk}">${v ? v.toFixed(2) : '—'}</td>`;
    });
    html += `<td class="${puanCls}">${d.puan ? d.puan.toFixed(0) : '—'}</td>`;
    html += `<td>${farkHtml}</td></tr>`;
  });

  html += '</tbody></table></div>';
  return html;
}

function denemeAccToggle() {
  const acc = $('deneme-acc'); if (!acc) return;
  const acik = acc.classList.toggle('acik');
  if (acik && !denemeCacheOku()) denemeYukle(false);
}

(function denemeBaslat() {
  const cache = denemeCacheOku();
  if (cache) {
    denemeRender(cache);
  } else {
    const ozetEl = $('deneme-acc-ozet');
    if (ozetEl) ozetEl.textContent = 'Açmak için tıkla';
  }
}());
