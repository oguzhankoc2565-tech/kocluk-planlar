  return (ad || '').split(' ').slice(0, 2).map(function (w) { return w[0] || ''; }).join('').toUpperCase();
}

function val(id) {
  var el = document.getElementById(id);
  if (!el) { console.warn('val(): element bulunamadı →', id); return '0'; }
  return el.value || '0';
}
function strVal(id) {
  var el = document.getElementById(id);
  if (!el) { console.warn('strVal(): element bulunamadı →', id); return ''; }

// ── SAYFA METAVERİLERİ ──

document.getElementById('dpnt').textContent =

// ══════════════════════════════════════════════════════════════════
//  ZAMAN
// ══════════════════════════════════════════════════════════════════

function trSaati() {
  var now = new Date();
  return new Date(now.getTime() + now.getTimezoneOffset() * 60000 + 3 * 3600000);
}

// Artık jsGun veya SON_GIRIS_SAATI nesnesi yok.
// Her günün kendi tarih nesnesi ve sonGiris saati var.
function gunDurumu(gun) {
  var simdi = trSaati();
  var bugun = new Date(simdi.getFullYear(), simdi.getMonth(), simdi.getDate());
  var gunT  = new Date(gun.tarih.getFullYear(), gun.tarih.getMonth(), gun.tarih.getDate());
  if (gunT > bugun) return 'kilitli';
  if (gunT < bugun) return 'gecmis';
  // Bugün — saate bak
  if (simdi.getHours() >= gun.sonGiris) return 'suresi_doldu';
  return 'aktif';
}

function kalanSure(gun) {
  var simdi = trSaati();
  var son   = new Date(simdi.getFullYear(), simdi.getMonth(), simdi.getDate(), gun.sonGiris, 0, 0, 0);
  var fark  = son - simdi;
  if (fark <= 0) return null;
  return {
    toplam: fark,
    s:  Math.floor(fark / 3600000),
    d:  Math.floor((fark % 3600000) / 60000),
    sn: Math.floor((fark % 60000) / 1000)
  };
}

// ══════════════════════════════════════════════════════════════════
//  HTML RENDER
// ══════════════════════════════════════════════════════════════════

var renkMap = { mat:'var(--mat)', fen:'var(--fen)', tur:'var(--tur)', ing:'var(--ing)', sos:'var(--sos)', din:'var(--din)', par:'var(--par)' };
var adMap   = { mat:'Mat', fen:'Fen', tur:'Türkçe', ing:'İngilizce', sos:'Sosyal', din:'Din', par:'Paragraf' };

function hesaplaNet(prefix, ders) {
  var d   = parseFloat(document.getElementById(prefix + '_' + ders + '_d').value) || 0;
  var y   = parseFloat(document.getElementById(prefix + '_' + ders + '_y').value) || 0;
  var net = (d - y / 3).toFixed(2);
  var el  = document.getElementById(prefix + '_' + ders + '_net');
  if (el) {
    el.textContent = net;
    el.style.color = parseFloat(net) >= 0 ? 'var(--fen)' : '#dc2626';
  }
}

function gorevDegisti(cb) {
  var parent = cb.closest('.gorev-item');
  if (parent) {
    var label = parent.querySelector('.gorev-metin');
    if (label) {
      if (cb.checked) label.classList.add('tamamlandi');
      else            label.classList.remove('tamamlandi');
    }
  }
}

function takipDersleriHTML(gun, durum) {
  var dis          = durum !== 'aktif' ? 'disabled' : '';
  var takipDersler = gun.dersler.filter(function (d) { return d.takipKey; });
  var pid          = gun.prefix;

  var html = '<div class="takip-bolum">' +
    '<div class="takip-baslik">Günlük takip — ' + gun.ad + '</div>' +
    '<div class="takip-dyb-header">' +
      '<div class="takip-dyb-header-bos"></div>' +
      '<div class="takip-dyb-header-lbl">D</div>' +
      '<div class="takip-dyb-header-lbl">Y</div>' +
      '<div class="takip-dyb-header-lbl">B</div>' +
      '<div class="takip-dyb-header-lbl">Net</div>' +
    '</div>' +
    '<div class="takip-satirlar">';

  takipDersler.forEach(function (d) {
    var renk = renkMap[d.takipKey] || 'var(--text)';
    var ad   = adMap[d.takipKey]  || d.ad;
    var did  = d.takipKey;
    html +=
      '<div class="takip-satir">' +
        '<div class="takip-satir-adi" style="color:' + renk + '">' + ad + '</div>' +
        '<input class="takip-input" type="number" min="0" id="' + pid+'_'+did+'_d" placeholder="0" '+dis+' data-p="'+pid+'" data-d="'+did+'" oninput="hesaplaNet(this.dataset.p,this.dataset.d)">' +
        '<input class="takip-input" type="number" min="0" id="' + pid+'_'+did+'_y" placeholder="0" '+dis+' data-p="'+pid+'" data-d="'+did+'" oninput="hesaplaNet(this.dataset.p,this.dataset.d)">' +
        '<input class="takip-input" type="number" min="0" id="' + pid+'_'+did+'_b" placeholder="0" '+dis+' data-p="'+pid+'" data-d="'+did+'" oninput="hesaplaNet(this.dataset.p,this.dataset.d)">' +
        '<div class="net-goster" id="' + pid+'_'+did+'_net">—</div>' +
      '</div>';
  });

  html += '</div>';
  html += '<div class="kp-row"><div class="kp-item"><div class="kp-label">Kitap (sayfa)</div>' +
    '<input class="kp-input" type="number" min="0" id="' + pid + '_kitap" placeholder="0" ' + dis + '></div></div>';
  html += '<input class="not-input" type="text" id="' + pid + '_not" placeholder="Bugünkü notun..." ' + dis + '>';

  if (durum === 'aktif') {

// ── ACCORDION ──
function gunTamamlanmaPct(gun) {
  var total = 0, done = 0;
  gun.dersler.forEach(function(d) {
    d.gorevler.forEach(function(g) {
      if (g.checkbox) {
        total++;
        var cb = document.getElementById(g.id);
        if (cb && cb.checked) done++;
      }
    });
  });
  return total > 0 ? Math.round(done / total * 100) : 0;
}

function accToggle(prefix) {
  var gun = GUNLER.find(function(g) { return g.prefix === prefix; });
  if (!gun) return;
  var durum = gunDurumu(gun);
  if (durum === 'kilitli') return;

  var item = document.getElementById('acc_' + prefix);
  var isAcik = item.classList.contains('acik');

  // Hepsini kapat
  GUNLER.forEach(function(g) {
    var el = document.getElementById('acc_' + g.prefix);
    if (el) { el.classList.remove('acik'); }
  });

  // Tıklanana toggle
  if (!isAcik) item.classList.add('acik');
}

function gonderiBilgisiTopla(gun) {
  var gorevBilgisi = {};
  gun.dersler.forEach(function (d) {
    if (!d.takipKey || d.takipKey === 'kit') return;
    var cbGorevler = d.gorevler.filter(function (g) { return g.checkbox; });
    if (!cbGorevler.length) return;
    var tamamlanan = cbGorevler.filter(function (g) {
      var cb = document.getElementById(g.id);
      return cb && cb.checked;
    }).length;
    gorevBilgisi[d.takipKey + '_gorev'] = tamamlanan + '/' + cbGorevler.length;
  });
  return gorevBilgisi;
}

function gonder(gunAdi, prefix) {
  var btn     = document.getElementById(prefix + '_btn');
  var mesajEl = document.getElementById(prefix + '_mesaj');
  btn.disabled    = true;
  btn.textContent = 'Kaydediliyor...';

  var gun          = GUNLER.find(function (g) { return g.prefix === prefix; });
  var gorevBilgisi = gun ? gonderiBilgisiTopla(gun) : {};

  var konular = [];
  if (gun) {
    var dAd = { mat:'Matematik', fen:'Fen', tur:'Turkce', ing:'Ingilizce', sos:'Sosyal', din:'Din', par:'Paragraf' };
    gun.dersler.forEach(function (d) {
      d.gorevler.forEach(function (g) {
        if (g.checkbox) {
          var cb = document.getElementById(g.id);
          if (cb && cb.checked) konular.push({ ders: dAd[d.takipKey] || d.takipKey, konu: g.metin });
        }
      });
    });
  }

  // Sadece o günde gerçekten var olan dersleri gönder
  // olmayan ders için val() uyarı vermez, Sheet'e 0 yazılır
  var TUM_DERSLER = ['mat','fen','tur','ing','sos','din','par'];
  var gunDersleri = gun
    ? gun.dersler.filter(function(d){ return d.takipKey; }).map(function(d){ return d.takipKey; })
    : [];

  var dersVerisi = {};
  TUM_DERSLER.forEach(function(k) {
    var varMi = gunDersleri.indexOf(k) !== -1;
    dersVerisi[k+'_d'] = varMi ? val(prefix+'_'+k+'_d') : '0';
    dersVerisi[k+'_y'] = varMi ? val(prefix+'_'+k+'_y') : '0';
    dersVerisi[k+'_b'] = varMi ? val(prefix+'_'+k+'_b') : '0';
  });

  var veri = Object.assign({
    ogrenciAdi: OGRENCI_ADI, haftaNo: HAFTA_NO, gun: gunAdi,
    kitap: val(prefix+'_kitap'),
    not:   strVal(prefix+'_not'),
    konular: konular
  }, dersVerisi, gorevBilgisi);

  // 'application/json' → preflight (CORS sorun) yaratır.
  // 'text/plain' → preflight gerekmez, Apps Script sorunsuz kabul eder.
  fetch(SCRIPT_URL, {
    method:  'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body:    JSON.stringify(veri)
  })
  .then(function (r) {
    if (!r.ok) throw new Error('HTTP ' + r.status);
    return r.json();
  })
  .then(function (data) {
    if (data.durum !== 'ok' && data.durum !== 'basarili') throw new Error(data.mesaj || 'Sunucu hatası');

    var rastgele = MOTIVASYON_MESAJLARI[Math.floor(Math.random() * MOTIVASYON_MESAJLARI.length)];
    mesajEl.textContent  = rastgele;
    mesajEl.className    = 'gonder-mesaj mesaj-ok';
    mesajEl.style.display = 'block';
    btn.textContent = 'Güncelle ✓';
    btn.classList.add('tamamlandi');
    btn.disabled = false;
    lsKaydet();
    setTimeout(yukleOzet, 1500);

    // Son gün gönderildi → haftalık özet popup
    if (gunAdi === SON_GUN_ADI) {
      setTimeout(function () {
        fetch(SCRIPT_URL + '?ogrenciAdi=' + encodeURIComponent(OGRENCI_ADI) + '&haftaNo=' + encodeURIComponent(HAFTA_NO))
          .then(function (r) { return r.json(); })
          .then(function (data) {
            if (data.durum === 'basarili' && data.gunler && data.gunler.length) {
              gosterHaftaOzetiPopup(data.gunler);
            }
          })
          .catch(function (err) { console.error('Hafta özeti yüklenemedi:', err); });
      }, 800);
    }
  })
  .catch(function (err) {
    console.error('Gönderim hatası:', err);
    mesajEl.textContent   = 'Gönderilemedi: ' + err.message + ' — tekrar dene.';
    mesajEl.className     = 'gonder-mesaj mesaj-hata';
    mesajEl.style.display = 'block';
    btn.disabled          = false;
    btn.textContent       = 'Tekrar Dene';
  });
}

//  LOCAL STORAGE  (debounce + temiz key)
// ══════════════════════════════════════════════════════════════════

function lsKaydet() {
  GUNLER.forEach(function (gun) {
    ['mat','fen','tur','ing','sos','din','par'].forEach(function (ders) {
      ['d','y','b'].forEach(function (tip) {
        var el = document.getElementById(gun.prefix + '_' + ders + '_' + tip);
        if (el && !el.disabled) localStorage.setItem(LS_PREFIX + gun.prefix + '_' + ders + '_' + tip, el.value);
      });
    });
    var kitap = document.getElementById(gun.prefix + '_kitap');
    if (kitap && !kitap.disabled) localStorage.setItem(LS_PREFIX + gun.prefix + '_kitap', kitap.value);
    var not = document.getElementById(gun.prefix + '_not');
    if (not && !not.disabled) localStorage.setItem(LS_PREFIX + gun.prefix + '_not', not.value);

    gun.dersler.forEach(function (d) {
      d.gorevler.forEach(function (g) {
        if (g.checkbox) {
          var cb = document.getElementById(g.id);
          if (cb && !cb.disabled) localStorage.setItem(LS_PREFIX + 'cb_' + g.id, cb.checked ? '1' : '0');
        }
      });
    });
  });
}

// Her tuş vuruşunda değil, 500ms sonra kaydet
var _lsTimer;
function lsKaydetDebounced() {
  clearTimeout(_lsTimer);
  _lsTimer = setTimeout(lsKaydet, 500);
}

function lsYukle() {
  GUNLER.forEach(function (gun) {
    ['mat','fen','tur','ing','sos','din','par'].forEach(function (ders) {
      ['d','y','b'].forEach(function (tip) {
        var el = document.getElementById(gun.prefix + '_' + ders + '_' + tip);
        if (el && !el.disabled) {
          var v = localStorage.getItem(LS_PREFIX + gun.prefix + '_' + ders + '_' + tip);
          if (v !== null && v !== '') { el.value = v; hesaplaNet(gun.prefix, ders); }
        }
      });
    });
    var kitap = document.getElementById(gun.prefix + '_kitap');
    if (kitap && !kitap.disabled) {
      var kv = localStorage.getItem(LS_PREFIX + gun.prefix + '_kitap');
      if (kv !== null) kitap.value = kv;
    }
    var not = document.getElementById(gun.prefix + '_not');
    if (not && !not.disabled) {
      var nv = localStorage.getItem(LS_PREFIX + gun.prefix + '_not');
      if (nv !== null) not.value = nv;
    }
    gun.dersler.forEach(function (d) {
      d.gorevler.forEach(function (g) {
        if (g.checkbox) {
          var cb = document.getElementById(g.id);
          if (cb && !cb.disabled) {
            var cv = localStorage.getItem(LS_PREFIX + 'cb_' + g.id);
            if (cv !== null) {
              cb.checked = (cv === '1');
              var label = document.querySelector('label[for="' + g.id + '"]');
              if (label) {
                if (cb.checked) label.classList.add('tamamlandi');
                else            label.classList.remove('tamamlandi');
              }
            }
          }
        }
      });
    });
    // Accordion mini bar güncelle
    accBarGuncelle(gun.prefix);
  });
}

function lsDinleyiciEkle() {
  document.querySelectorAll('.takip-input, .kp-input, .not-input').forEach(function (el) {
    el.addEventListener('input', lsKaydetDebounced);
  });
  document.querySelectorAll('.gorev-cb').forEach(function (el) {
    el.addEventListener('change', lsKaydetDebounced);
  });
}

var OZET_DERSLER = [
  { key:'mat', ad:'Mat',      renk:'var(--mat)' },
  { key:'fen', ad:'Fen',      renk:'var(--fen)' },
  { key:'tur', ad:'Türkçe',   renk:'var(--tur)' },
  { key:'ing', ad:'İng',      renk:'var(--ing)' },
  { key:'sos', ad:'Sosyal',   renk:'var(--sos)' },
  { key:'din', ad:'Din',      renk:'var(--din)' },
  { key:'par', ad:'Paragraf', renk:'var(--par)' },
];

function renderOzetTablo(gunler) {
  var el = document.getElementById('haftalikOzetIcerik');
  if (!el) return;
  if (!gunler || !gunler.length) {
    el.innerHTML = '<div class="ozet-bos">Henüz bu haftaya ait kayıt yok.</div>';
    return;
  }
  var html = '<div style="overflow-x:auto"><table class="ozet-tablo"><thead><tr><th>Gün</th>';
  OZET_DERSLER.forEach(function (d) { html += '<th style="color:' + d.renk + '">' + d.ad + '</th>'; });
  html += '<th style="color:var(--kit)">Kitap</th><th style="color:var(--mat);border-left:2px solid var(--border)">Günlük</th></tr></thead><tbody>';

  var toplamSoru = 0;
  var toplamKitap = 0;
  // Her ders için toplam D, Y, B tut
  var dersToplam = {};
  OZET_DERSLER.forEach(function(d) { dersToplam[d.key] = {d:0, y:0, b:0}; });

  gunler.forEach(function (g) {
    html += '<tr><td>' + (g.gun || '—') + '</td>';
    OZET_DERSLER.forEach(function (d) {
      var dv = Number(g[d.key+'_d']||0), yv = Number(g[d.key+'_y']||0), bv = Number(g[d.key+'_b']||0);
      var total = dv + yv + bv;
      toplamSoru += total;
      dersToplam[d.key].d += dv;
      dersToplam[d.key].y += yv;
      dersToplam[d.key].b += bv;
      if (!total) {
        html += '<td class="ozet-net-yok">—</td>';
      } else {
        var net  = dv - yv / 3;
        var renk = net >= 0 ? d.renk : '#dc2626';
        html += '<td style="color:' + renk + '">' + net.toFixed(1) +
          '<span style="font-size:10px;color:var(--muted);font-weight:400"> (' + total + ')</span></td>';
      }
    });
    var kitap = g.kitap && g.kitap > 0 ? g.kitap : 0;
    toplamKitap += kitap;
    html += '<td style="color:var(--kit)">' + (kitap > 0 ? kitap + ' s.' : '—') + '</td>';
    // Günlük toplam soru
    var gunSoru = OZET_DERSLER.reduce(function(acc, d) {
      return acc + Number(g[d.key+'_d']||0) + Number(g[d.key+'_y']||0) + Number(g[d.key+'_b']||0);
    }, 0);
    html += '<td style="font-weight:800;color:var(--mat);font-size:13px;border-left:2px solid var(--border);text-align:center">' + (gunSoru > 0 ? gunSoru : '—') + '</td></tr>';
  });

  // ── TOPLAM SATIRI ──
  html += '<tr style="border-top:2px solid var(--mat)">';
  html += '<td style="font-size:11px;font-weight:800;color:var(--mat);letter-spacing:0.06em;text-transform:uppercase">Toplam</td>';
  OZET_DERSLER.forEach(function(d) {
    var dv = dersToplam[d.key].d, yv = dersToplam[d.key].y, bv = dersToplam[d.key].b;
    var total = dv + yv + bv;
    if (!total) {
      html += '<td class="ozet-net-yok">—</td>';
    } else {
      var net  = dv - yv / 3;
      var renk = net >= 0 ? d.renk : '#dc2626';
      html += '<td style="color:' + renk + ';font-size:13px;font-weight:800">' + net.toFixed(1) +
        '<span style="font-size:10px;color:var(--muted);font-weight:400"> (' + total + ')</span></td>';
    }
  });
  html += '<td style="color:var(--kit);font-weight:800">' + (toplamKitap > 0 ? toplamKitap + ' s.' : '—') + '</td>';
  html += '<td style="font-weight:800;color:var(--mat);font-size:13px;border-left:2px solid var(--border);text-align:center">' + toplamSoru + '</td>';
  html += '</tr>';

  html += '</tbody></table></div>';
  html += '<div style="margin-top:10px;font-size:12px;color:var(--muted);text-align:right;font-weight:600">' +
    '📊 ' + gunler.length + ' gün kayıtlı &nbsp;·&nbsp; ✏️ Toplam ' + toplamSoru + ' soru</div>';
  el.innerHTML = html;
}

function yukleOzet() {
  fetch(SCRIPT_URL + '?ogrenciAdi=' + encodeURIComponent(OGRENCI_ADI) + '&haftaNo=' + encodeURIComponent(HAFTA_NO))
    .then(function (r) { return r.json(); })
    .then(function (data) {
      if (data.durum === 'basarili') {
        renderOzetTablo(data.gunler || []);
      } else {
        document.getElementById('haftalikOzetIcerik').innerHTML =
          '<div class="ozet-bos">Veri alınamadı.</div>';
      }
    })
    .catch(function (err) {
      console.error('Özet yüklenemedi:', err);
      document.getElementById('haftalikOzetIcerik').innerHTML =
        '<div class="ozet-bos">Bağlantı hatası — sayfayı yenile.</div>';
    });
}

// ── HAFTALIK ÖZET POPUP ──
var TEBRIK_MESAJLARI = [
  'Bu hafta gerçekten harika bir performans sergiliyorsun! Rakamlar bunu açıkça söylüyor.',
  'Haftayı güçlü bitirdin! Her gün biraz daha ileri gidiyorsun, bunu unutma.',
  'Sayılara bak! Bu hafta kendini astın. Böyle devam edersen LGS\'de istediğin yere gelirsin.',
  'Harika bir hafta geçirdin! Bu temponu korursan hedef puanına ulaşman an meselesi.'
];
var MOTIVASYON_HAFTALIK = [
  'Bu hafta istediğin kadar verimli olmadı ama bu bitti demek değil. Gelecek hafta daha güçlü başlayacaksın.',
  'Bazı haftalar zor geçer. Önemli olan bırakmamak. Devam et!',
  'Zor bir hafta geçirdin. Pazar dinlen, pazartesi temiz sayfa aç.'
];

function rastgeleSecim(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function hesaplaHaftaOzeti(gunler) {
  var toplamSoru = 0, toplamKitap = 0, toplamParagraf = 0;
  var dersToplam    = { mat:0, fen:0, tur:0, ing:0, sos:0, din:0 };
  var dersGunSayisi = { mat:0, fen:0, tur:0, ing:0, sos:0, din:0 };
  var enIyiGun = null, enIyiSoru = -1;

  gunler.forEach(function (g) {
    var gunSoru = 0;
    ['mat','fen','tur','ing','sos','din'].forEach(function (d) {
      var net  = (Number(g[d+'_d'])||0) - (Number(g[d+'_y'])||0) / 3;
      var soru = (Number(g[d+'_d'])||0) + (Number(g[d+'_y'])||0) + (Number(g[d+'_b'])||0);
      if (soru > 0) { dersToplam[d] += net; dersGunSayisi[d]++; gunSoru += soru; }
    });
    toplamParagraf += Number(g.paragraf) || 0;
    gunSoru    += Number(g.paragraf) || 0;
    toplamSoru += gunSoru;
    toplamKitap+= Number(g.kitap) || 0;
    if (gunSoru > enIyiSoru) { enIyiSoru = gunSoru; enIyiGun = g.gun; }
  });

  var dersNetleri = {};
  Object.keys(dersToplam).forEach(function (d) {
    dersNetleri[d] = dersGunSayisi[d] > 0 ? (dersToplam[d] / dersGunSayisi[d]).toFixed(1) : null;
  });
  return { toplamSoru:toplamSoru, toplamKitap:toplamKitap, toplamParagraf:toplamParagraf,
           dersNetleri:dersNetleri, enIyiGun:enIyiGun, enIyiSoru:enIyiSoru };
}

function gosterHaftaOzetiPopup(gunler) {
  var ozet  = hesaplaHaftaOzeti(gunler);
  var iyi   = ozet.toplamSoru >= 150;
  var mesaj = iyi ? rastgeleSecim(TEBRIK_MESAJLARI) : rastgeleSecim(MOTIVASYON_HAFTALIK);
  var dAd   = { mat:'Matematik', fen:'Fen', tur:'Türkçe', ing:'İngilizce', sos:'Sosyal', din:'Din' };
  var dRenk = { mat:'#2563eb',   fen:'#16a34a', tur:'#9333ea', ing:'#d97706', sos:'#0891b2', din:'#be185d' };

  var kartlar = Object.keys(ozet.dersNetleri).map(function (d) {
    var net = ozet.dersNetleri[d];
    if (net === null) return '';
    var r = dRenk[d];
    return '<div style="text-align:center;padding:8px 6px;border-radius:10px;border:2px solid '+r+'22;background:'+r+'11">' +
      '<div style="font-size:11px;font-weight:800;color:'+r+';text-transform:uppercase">'+dAd[d]+'</div>' +
      '<div style="font-size:20px;font-weight:900;color:'+r+'">'+net+'</div>' +
      '<div style="font-size:10px;color:#64748b">ort. net</div></div>';
  }).filter(Boolean).join('');

  var overlay = document.createElement('div');
  overlay.id = 'hafta-ozeti-overlay';
  overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);z-index:9999;display:flex;align-items:center;justify-content:center;padding:16px';
  overlay.innerHTML =
    '<div style="background:white;border-radius:20px;padding:24px;max-width:420px;width:100%;max-height:90vh;overflow-y:auto;position:relative">' +
      '<button id="hafta-kapat-btn" style="position:absolute;top:12px;right:14px;background:none;border:none;font-size:22px;cursor:pointer;color:#94a3b8">×</button>' +
      '<div style="text-align:center;margin-bottom:16px">' +
        '<div style="font-size:36px;margin-bottom:6px">'+(iyi?'🏆':'💪')+'</div>' +
        '<div style="font-size:18px;font-weight:900;color:#1a1a2e">Haftanı Tamamladın!</div>' +
      '</div>' +
      '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px">' +
        '<div style="text-align:center;padding:10px 6px;border-radius:12px;background:#f0f4ff;border:2px solid #dde3f0"><div style="font-size:24px;font-weight:900;color:#2563eb">'+ozet.toplamSoru+'</div><div style="font-size:11px;font-weight:700;color:#64748b">toplam soru</div></div>' +
        '<div style="text-align:center;padding:10px 6px;border-radius:12px;background:#f0fdf4;border:2px solid #bbf7d0"><div style="font-size:24px;font-weight:900;color:#16a34a">'+ozet.toplamKitap+'</div><div style="font-size:11px;font-weight:700;color:#64748b">sayfa kitap</div></div>' +
        '<div style="text-align:center;padding:10px 6px;border-radius:12px;background:#fefce8;border:2px solid #fde68a"><div style="font-size:24px;font-weight:900;color:#b45309">'+ozet.toplamParagraf+'</div><div style="font-size:11px;font-weight:700;color:#64748b">paragraf</div></div>' +
      '</div>' +
      (ozet.enIyiGun ? '<div style="text-align:center;margin-bottom:12px;padding:8px;background:#faf5ff;border-radius:10px;border:2px solid #e9d5ff"><span style="font-size:13px;font-weight:700;color:#7c3aed">⭐ En iyi günün: '+ozet.enIyiGun+' ('+ozet.enIyiSoru+' soru)</span></div>' : '') +
      '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:14px">'+kartlar+'</div>' +
      '<div style="padding:14px 16px;border-radius:12px;background:'+(iyi?'#f0fdf4':'#fefce8')+';border:2px solid '+(iyi?'#86efac':'#fde68a')+';font-size:14px;font-weight:600;color:'+(iyi?'#15803d':'#854d0e')+';line-height:1.6;text-align:center">'+mesaj+'</div>' +
    '</div>';

  document.body.appendChild(overlay);
  document.getElementById('hafta-kapat-btn').addEventListener('click', function () { overlay.remove(); });
  overlay.addEventListener('click', function (e) { if (e.target === overlay) overlay.remove(); });
}

// ── BAŞLAT ──
lsYukle();
lsDinleyiciEkle();
yukleOzet();
</script>
