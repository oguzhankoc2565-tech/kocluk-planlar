<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title id="page-title">Haftalık Plan</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  /* ═══════════════════════════════════════════════════════════════════
     TEMA — Tek noktada tanımlı (eskiden iki ayrı style bloğu vardı)
     Tema değiştirmek için sadece --primary-1 ve --primary-2'yi değiştir.
  ═══════════════════════════════════════════════════════════════════ */
  :root {
    /* Ana tema renkleri (teal/cyan) */
    --primary-1: #0f766e;
    --primary-2: #0891b2;
    --primary-grad: linear-gradient(135deg, var(--primary-1) 0%, var(--primary-2) 100%);

    /* Genel renkler */
    --bg: #f0f4ff;
    --white: #fff;
    --text: #1a1a2e;
    --muted: #6b7280;
    --border: #dde3f0;

    /* Ders renkleri */
    --mat: #2563eb; --mat-bg: #eff6ff;
    --ing: #d97706; --ing-bg: #fffbeb;
    --fen: #16a34a; --fen-bg: #f0fdf4;
    --tur: #9333ea; --tur-bg: #faf5ff;
    --sos: #0891b2; --sos-bg: #ecfeff;
    --din: #be185d; --din-bg: #fdf2f8;
    --kit: #475569; --kit-bg: #f8fafc;
    --par: #b45309; --par-bg: #fefce8;
    --pazar: #4d7c0f; --pazar-bg: #f7fee7;

    /* Durum renkleri */
    --success: #16a34a;
    --danger: #dc2626;
    --warning: #d97706;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 15px;
    line-height: 1.6;
    padding: 20px;
  }
  .page { max-width: 880px; margin: 0 auto; }

  /* ── HEADER ── */
  .header {
    background: var(--primary-grad);
    border-radius: 20px;
    padding: 22px 28px;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 18px;
    color: white;
  }
  .avatar {
    width: 56px; height: 56px;
    border-radius: 50%;
    background: rgba(255,255,255,0.25);
    font-weight: 800; font-size: 18px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    border: 2px solid rgba(255,255,255,0.5);
  }
  .header-info h1 { font-size: 22px; font-weight: 800; color: white; }
  .header-info .meta { font-size: 13px; color: rgba(255,255,255,0.8); margin-top: 2px; }
  .badges { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
  .badge {
    font-size: 12px; padding: 4px 12px; border-radius: 20px; font-weight: 700;
    background: rgba(255,255,255,0.2);
    color: white;
    border: 1px solid rgba(255,255,255,0.4);
  }
  .badge-mat { background: rgba(255,255,255,0.2); }
  .badge-ing { background: rgba(255,200,0,0.3); border-color: rgba(255,200,0,0.5); }
  .badge-fen { background: rgba(0,255,100,0.2); border-color: rgba(0,255,100,0.4); }
  .badge-tur { background: rgba(200,100,255,0.3); border-color: rgba(200,100,255,0.5); }
  .badge-sos { background: rgba(0,200,255,0.2); border-color: rgba(0,200,255,0.4); }
  .badge-din { background: rgba(255,100,150,0.3); border-color: rgba(255,100,150,0.5); }
  .bursluluk-badge {
    display: inline-block;
    background: linear-gradient(135deg, #fbbf24, #f59e0b);
    color: white; font-size: 11px; font-weight: 800;
    padding: 3px 10px; border-radius: 10px;
    margin-left: 6px; vertical-align: middle;
  }

  /* ── KARTLAR ── */
  .card {
    background: var(--white);
    border: 2px solid var(--border);
    border-radius: 16px;
    padding: 18px 22px;
    margin-bottom: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
  }
  .card-label {
    font-size: 11px; font-weight: 800; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--muted); margin-bottom: 10px;
  }

  /* ── DURUM GRID ── */
  .durum-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 14px; }
  .durum-item {
    background: var(--bg); border: 2px solid var(--border);
    border-radius: 12px; padding: 12px 16px;
  }
  .durum-label { font-size: 12px; color: var(--muted); margin-bottom: 3px; font-weight: 600; }
  .durum-val { font-size: 20px; font-weight: 800; }
  .durum-val.puan { color: var(--mat); }
  .durum-val.hedef { color: var(--success); }

  /* ── NET KARTLAR ── */
  .net-kartlar { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
  .net-kart {
    border-radius: 10px; padding: 8px 12px;
    text-align: center; min-width: 72px;
    border: 2px solid var(--border);
  }
  .ders-mat-bg { background: var(--mat-bg); border-color: #bfdbfe; }
  .ders-ing-bg { background: var(--ing-bg); border-color: #fde68a; }
  .ders-fen-bg { background: var(--fen-bg); border-color: #bbf7d0; }
  .ders-tur-bg { background: var(--tur-bg); border-color: #e9d5ff; }
  .ders-sos-bg { background: var(--sos-bg); border-color: #a5f3fc; }
  .ders-din-bg { background: var(--din-bg); border-color: #fbcfe8; }
  .net-kart-ders { font-size: 11px; font-weight: 700; color: var(--muted); margin-bottom: 2px; }
  .net-kart-sayi { font-size: 18px; font-weight: 800; }
  .net-kart-label { font-size: 10px; color: var(--muted); font-weight: 600; }
  .net-kart-hedef {
    font-size: 11px; font-weight: 700; color: var(--success);
    margin-top: 3px; border-top: 1px dashed #d1d5db; padding-top: 3px;
  }
  .ortalama-notu {
    margin-top: 12px; padding: 10px 14px;
    background: #fefce8; border: 2px solid #fde68a;
    border-radius: 10px;
    font-size: 13px; font-weight: 700; color: #854d0e;
  }

  /* ── KOÇ DEĞERLENDİRMESİ ── */
  .kocundan-text {
    font-size: 15px; line-height: 1.85;
    padding: 16px 20px;
    background: linear-gradient(135deg, #ecfeff, #f0fdfa);
    border-left: 4px solid var(--primary-2);
    border-radius: 0 12px 12px 0;
  }

  /* ── HEDEF GRID ── */
  .hedef-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .hedef-item {
    background: var(--bg); border: 2px solid var(--border);
    border-radius: 12px; padding: 12px 16px;
  }
  .hedef-label { font-size: 12px; color: var(--muted); margin-bottom: 3px; font-weight: 600; }
  .hedef-val { font-size: 16px; font-weight: 800; }
  .plan-label {
    font-size: 11px; font-weight: 800; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--muted);
    margin-bottom: 10px; padding: 0 4px;
  }

  /* ── HEDEF YOLU ── */
  .hedef-yolu {
    background: var(--white); border: 2px solid var(--border);
    border-radius: 16px; padding: 18px 22px; margin-bottom: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
  }
  .hedef-yolu-baslik {
    font-size: 11px; font-weight: 800; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--muted); margin-bottom: 14px;
  }
  .hedef-yolu-track { position: relative; height: 36px; margin: 0 0 10px; }
  .hedef-yolu-bg {
    position: absolute; top: 14px; left: 0; right: 0; height: 8px;
    background: var(--border); border-radius: 4px;
  }
  .hedef-yolu-fill {
    position: absolute; top: 14px; left: 0; height: 8px;
    background: var(--primary-grad); border-radius: 4px;
    transition: width 1s cubic-bezier(.16,1,.3,1);
  }
  .hedef-yolu-top {
    position: absolute; top: 0; transform: translateX(-50%);
    display: flex; flex-direction: column; align-items: center; gap: 2px;
  }
  .hedef-yolu-top-dot {
    width: 20px; height: 20px; border-radius: 50%;
    border: 3px solid white;
    box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    display: flex; align-items: center; justify-content: center; font-size: 10px;
  }
  .hedef-yolu-labels {
    display: flex; justify-content: space-between;
    font-size: 11px; color: var(--muted); font-weight: 600; margin-top: 4px;
  }
  .hedef-yolu-bilgi {
    margin-top: 10px; font-size: 13px; color: var(--text);
    font-weight: 600; text-align: center;
  }
  .hedef-yolu-bilgi span { color: var(--mat); font-weight: 800; }

  /* ── ACCORDION ── */
  .accordion { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }
  .acc-item {
    background: var(--white); border: 2px solid var(--border);
    border-radius: 16px; overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    transition: border-color 0.2s;
  }
  .acc-item.aktif {
    border-color: var(--primary-2);
    box-shadow: 0 4px 16px rgba(8,145,178,0.1);
  }
  .acc-item.gecmis { opacity: 0.75; }
  .acc-item.kilitli { opacity: 0.5; }
  .acc-header {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 18px; cursor: pointer; user-select: none;
    transition: background 0.15s;
  }
  .acc-header:hover { background: var(--bg); }
  .acc-item.kilitli .acc-header { cursor: not-allowed; }
  .acc-gun-adi { font-size: 15px; font-weight: 800; color: var(--text); min-width: 90px; }
  .acc-item.aktif .acc-gun-adi { color: var(--primary-2); }
  .acc-tarih { font-size: 12px; color: var(--muted); font-weight: 600; }
  .acc-soru {
    font-size: 11px; font-weight: 700; color: var(--mat);
    margin-top: 2px; min-height: 14px;
  }
  .acc-mini-bar {
    flex: 1; height: 6px; background: var(--border);
    border-radius: 3px; overflow: hidden; min-width: 40px; max-width: 120px;
  }
  .acc-mini-fill {
    height: 100%; border-radius: 3px;
    background: var(--primary-grad);
    transition: width 0.4s;
  }
  .acc-badges { display: flex; gap: 6px; align-items: center; }
  .acc-chevron {
    font-size: 14px; color: var(--muted);
    transition: transform 0.25s; flex-shrink: 0;
  }
  .acc-item.acik .acc-chevron { transform: rotate(180deg); }
  .acc-body { display: none; padding: 0 18px 18px; border-top: 1px solid var(--border); }
  .acc-item.acik .acc-body { display: block; }

  /* ── GÜN KARTI İÇİ ── */
  .gun-baslik {
    font-size: 14px; font-weight: 800; margin-bottom: 12px;
    padding-bottom: 10px; border-bottom: 2px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
  }
  .gun-tarih { font-size: 12px; color: var(--muted); font-weight: 600; }
  .gun-durum-badge { font-size: 11px; padding: 3px 10px; border-radius: 10px; font-weight: 700; }
  .badge-aktif { background: #dcfce7; color: #15803d; }
  .badge-kilitli { background: #f1f5f9; color: #64748b; }
  .badge-gecmis { background: #fef9c3; color: #854d0e; }

  /* ── DERS BLOĞU ── */
  .ders-blok { margin-bottom: 10px; }
  .ders-baslik {
    font-size: 11px; font-weight: 800; letter-spacing: 0.05em;
    text-transform: uppercase; margin-bottom: 5px;
    padding: 3px 8px; border-radius: 6px; display: inline-block;
  }
  .ders-mat { color: var(--mat); background: var(--mat-bg); }
  .ders-ing { color: var(--ing); background: var(--ing-bg); }
  .ders-fen { color: var(--fen); background: var(--fen-bg); }
  .ders-tur { color: var(--tur); background: var(--tur-bg); }
  .ders-sos { color: var(--sos); background: var(--sos-bg); }
  .ders-din { color: var(--din); background: var(--din-bg); }
  .ders-kit { color: var(--kit); background: var(--kit-bg); }
  .ders-par { color: var(--par); background: var(--par-bg); }

  .gorev-list { padding: 0; }
  .gorev-item { display: flex; align-items: flex-start; gap: 8px; padding: 4px 0; }
  .gorev-item.soru-gorev { padding-left: 4px; }
  .gorev-cb {
    width: 16px; height: 16px; margin-top: 2px;
    flex-shrink: 0; accent-color: var(--mat); cursor: pointer;
  }
  .gorev-cb:disabled { cursor: not-allowed; opacity: 0.5; }
  .gorev-metin { font-size: 13px; line-height: 1.5; transition: all 0.2s; }
  .gorev-metin.tamamlandi { text-decoration: line-through; color: var(--muted); opacity: 0.7; }
  .gorev-nokta { font-size: 9px; color: var(--muted); margin-top: 5px; flex-shrink: 0; }

  /* ── TAKİP BÖLÜMÜ ── */
  .takip-bolum { margin-top: 12px; padding-top: 12px; border-top: 2px dashed var(--border); }
  .takip-baslik {
    font-size: 11px; font-weight: 800; letter-spacing: 0.06em;
    text-transform: uppercase; color: var(--muted); margin-bottom: 8px;
  }
  .takip-dyb-header { display: flex; gap: 4px; margin-bottom: 4px; align-items: center; }
  .takip-dyb-header-bos { width: 70px; }
  .takip-dyb-header-lbl {
    width: 40px; font-size: 10px; color: var(--muted);
    text-align: center; font-weight: 700;
  }
  .takip-satirlar { display: flex; flex-direction: column; gap: 6px; }
  .takip-satir { display: flex; align-items: center; gap: 4px; }
  .takip-satir-adi { font-size: 12px; font-weight: 700; min-width: 70px; }
  .takip-input {
    width: 40px; height: 30px;
    border: 2px solid var(--border); border-radius: 8px;
    background: #fafafa; font-size: 13px; text-align: center;
    font-family: 'Nunito', sans-serif; color: var(--text); font-weight: 700;
  }
  .takip-input:focus { outline: none; border-color: var(--primary-2); background: #fff; }
  .takip-input:disabled { background: #f1f5f9; color: #aaa; cursor: not-allowed; }
  .net-goster {
    width: 40px; font-size: 12px; font-weight: 800;
    text-align: center; color: var(--success);
  }
  /* Günlük toplam satırı (D/Y/B/Net) */
  .takip-toplam {
    margin-top: 6px; padding-top: 6px;
    border-top: 1.5px dashed var(--border);
  }
  .takip-toplam-val {
    width: 40px; height: 30px;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 800; color: var(--text);
    background: var(--bg); border-radius: 8px;
  }
  .takip-toplam-net { color: var(--success); }
  .kp-row { display: flex; gap: 10px; margin-top: 8px; }
  .kp-item { display: flex; flex-direction: column; gap: 3px; }
  .kp-label { font-size: 11px; color: var(--muted); font-weight: 600; }
  .kp-input {
    width: 80px; height: 30px;
    border: 2px solid var(--border); border-radius: 8px;
    background: #fafafa; font-size: 13px; text-align: center;
    font-family: 'Nunito', sans-serif; color: var(--text); font-weight: 700;
  }
  .kp-input:focus { outline: none; border-color: var(--primary-2); background: #fff; }
  .kp-input:disabled { background: #f1f5f9; color: #aaa; cursor: not-allowed; }
  .not-input {
    width: 100%; margin-top: 8px; height: 34px;
    border: 2px solid var(--border); border-radius: 8px;
    background: #fafafa; font-size: 13px; padding: 0 10px;
    font-family: 'Nunito', sans-serif; color: var(--text);
  }
  .not-input:focus { outline: none; border-color: var(--primary-2); background: #fff; }
  .not-input:disabled { background: #f1f5f9; color: #aaa; cursor: not-allowed; }

  /* ── GERİ SAYIM & BUTON ── */
  .geri-sayim {
    font-size: 12px; color: var(--primary-2); font-weight: 700;
    margin-top: 8px; text-align: center;
  }
  .geri-sayim.son-dakika { color: var(--danger); }
  .gonder-btn {
    width: 100%; margin-top: 10px; padding: 10px;
    background: var(--primary-grad);
    color: white; border: none; border-radius: 10px;
    font-size: 13px; font-weight: 800; font-family: 'Nunito', sans-serif;
    cursor: pointer; transition: opacity 0.2s;
  }
  .gonder-btn:hover:not(:disabled) { opacity: 0.88; }
  .gonder-btn:active:not(:disabled) { transform: scale(0.98); }
  .gonder-btn:disabled { background: #94a3b8; cursor: not-allowed; }
  .gonder-btn.tamamlandi { background: linear-gradient(135deg, #15803d, #16a34a); }

  .gonder-mesaj {
    display: none; margin-top: 8px; padding: 10px 14px;
    border-radius: 10px; font-size: 14px; font-weight: 700; text-align: center;
  }
  .mesaj-ok   { background: var(--fen-bg); color: #15803d; border: 2px solid #bbf7d0; }
  .mesaj-hata { background: #fef2f2; color: var(--danger); border: 2px solid #fecaca; }
  .kilit-overlay {
    text-align: center; padding: 14px 8px;
    font-size: 13px; color: var(--muted); font-weight: 600;
  }

  /* ── PAZAR & KOÇ NOTU ── */
  .pazar-card {
    background: var(--pazar-bg); border: 2px solid #bbf7d0;
    border-radius: 16px; padding: 14px 20px; margin-bottom: 12px;
  }
  .pazar-baslik { font-size: 13px; font-weight: 800; color: var(--pazar); margin-bottom: 4px; }
  .pazar-text { font-size: 13px; color: #365314; }
  .pazar-text span { margin-right: 12px; }
  .koc-notu {
    background: linear-gradient(135deg, #ecfeff, #f0fdfa);
    border: 2px solid #a5f3fc;
    border-radius: 16px; padding: 18px 22px; margin-bottom: 12px;
  }
  .koc-notu-baslik {
    font-size: 11px; font-weight: 800; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--primary-2); margin-bottom: 8px;
  }
  .koc-notu-text { font-size: 14px; line-height: 1.75; }
  .dipnot {
    font-size: 12px; color: var(--muted);
    text-align: center; margin-top: 8px; font-weight: 600;
  }

  /* ── DURUM + STATS YAN YANA ── */
  #dur-stats-wrap {
    display: grid; grid-template-columns: 1fr 320px;
    gap: 0; margin-bottom: 12px; align-items: stretch;
  }
  #dur-stats-wrap > div { margin-bottom: 0; }
  #dur-stats-wrap #dur-kart .card {
    border-top-right-radius: 0;
    border-bottom-right-radius: 0;
    border-right: none;
    margin-bottom: 0;
    height: 100%; box-sizing: border-box;
  }
  #dur-stats-wrap #stats-kart .stats-kart {
    border-top-left-radius: 0;
    border-bottom-left-radius: 0;
    margin-bottom: 0;
    height: 100%; box-sizing: border-box;
  }

  /* ── STATS KARTI ── */
  .stats-kart {
    background: var(--white); border: 2px solid var(--border);
    border-radius: 16px; padding: 16px; margin-bottom: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
  }
  .stats-skor {
    background: var(--bg); border: 1.5px solid var(--border);
    border-radius: 10px; padding: 8px 4px; text-align: center;
  }
  .stats-skor-val { font-size: 20px; font-weight: 800; line-height: 1; }
  .stats-skor-lbl {
    font-size: 9px; font-weight: 600; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.05em; margin-top: 3px;
  }
  .stats-bar-row { display: flex; align-items: center; gap: 7px; margin-bottom: 5px; }
  .stats-gun-dots {
    display: flex; gap: 4px; justify-content: center;
    margin-top: 12px; padding-top: 12px;
    border-top: 1.5px solid var(--border);
  }
  .stats-gun-dot {
    width: 26px; height: 26px; border-radius: 6px;
    font-size: 9px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
  }
  .stats-gun-on  { background: #dcfce7; color: #15803d; }
  .stats-gun-off { background: #f1f5f9; color: #94a3b8; }

  /* ── ÖZET TABLO ── */
  .ozet-kart {
    background: var(--white); border: 2px solid var(--border);
    border-radius: 16px; padding: 18px 22px; margin-bottom: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
  }
  .ozet-baslik {
    font-size: 11px; font-weight: 800; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--muted); margin-bottom: 12px;
  }
  .ozet-tablo { width: 100%; border-collapse: collapse; }
  .ozet-tablo th {
    font-size: 10px; font-weight: 800; text-transform: uppercase;
    letter-spacing: 0.05em; color: var(--muted);
    padding: 6px 8px; text-align: center; border-bottom: 2px solid var(--border);
  }
  .ozet-tablo th:first-child { text-align: left; }
  .ozet-tablo td {
    font-size: 13px; padding: 7px 8px; text-align: center;
    border-bottom: 1px solid var(--border); font-weight: 700;
  }
  .ozet-tablo td:first-child {

function esc(s) {
  if (s === null || s === undefined) return '';
  const div = document.createElement('div');
  div.textContent = String(s);
  return div.innerHTML;
}

// ── LOCALSTORAGE GÜVENLİ WRAPPER ─────────────────────────────────
const LS = {
  get(key) {
    try { return localStorage.getItem(key); }
    catch (e) { warn('LS get hata:', e); return null; }
  },
  set(key, val) {
    try { localStorage.setItem(key, val); return true; }
    catch (e) { warn('LS set hata:', e); return false; }
  },
  remove(key) {
    try { localStorage.removeItem(key); }
    catch (e) { warn('LS remove hata:', e); }
  }
};

  const el = $(id);

  return el.value || '0';
}
function strVal(id) {
  const el = $(id);
  if (!el) { warn('strVal(): element yok →', id); return ''; }

}

  return (ad || '').split(' ').slice(0, 2).map(w => w[0] || '').join('').toUpperCase();

//  ZAMAN

function trSaati() {
  const now = new Date();
  return new Date(now.getTime() + now.getTimezoneOffset() * 60000 + 3 * 3600000);
}

function gunDurumu(gun) {
  const simdi = trSaati();
  const bugun = new Date(simdi.getFullYear(), simdi.getMonth(), simdi.getDate());
  const gunT  = new Date(gun.tarih.getFullYear(), gun.tarih.getMonth(), gun.tarih.getDate());
  if (gunT > bugun) return 'kilitli';
  if (gunT < bugun) return 'gecmis';
  if (simdi.getHours() >= gun.sonGiris) return 'suresi_doldu';
  return 'aktif';
}

function kalanSure(gun) {
  const simdi = trSaati();
  const son   = new Date(simdi.getFullYear(), simdi.getMonth(), simdi.getDate(), gun.sonGiris, 0, 0, 0);
  const fark  = son - simdi;
  if (fark <= 0) return null;
  return {
    toplam: fark,
    s:  Math.floor(fark / 3600000),
    d:  Math.floor((fark % 3600000) / 60000),
    sn: Math.floor((fark % 60000) / 1000)
  };
}

// ═══════════════════════════════════════════════════════════════════
//  HESAPLAMA
// ═══════════════════════════════════════════════════════════════════

function hesaplaNet(prefix, ders) {
  const dEl = $(prefix + '_' + ders + '_d');
  const yEl = $(prefix + '_' + ders + '_y');
  if (!dEl || !yEl) return;
  const d   = parseFloat(dEl.value) || 0;
  const y   = parseFloat(yEl.value) || 0;
  const net = (d - y / 3).toFixed(2);
  const el  = $(prefix + '_' + ders + '_net');
  if (el) {
    el.textContent = net;
    el.style.color = parseFloat(net) >= 0 ? 'var(--success)' : 'var(--danger)';
  }
  guncelleToplam(prefix);
  accSoruGuncelle(prefix);
}

// Günlük toplam D/Y/B ve Net (takip bölümünün sonundaki "Toplam" satırı)
function guncelleToplam(prefix) {
  const gun = GUNLER.find(g => g.prefix === prefix);
  if (!gun) return;
  const takipDersler = gun.dersler.filter(d => d.takipKey);

  let topD = 0, topY = 0, topB = 0;
  takipDersler.forEach(d => {
    const did = d.takipKey;
    topD += parseInt(val(prefix + '_' + did + '_d')) || 0;
    topY += parseInt(val(prefix + '_' + did + '_y')) || 0;
    topB += parseInt(val(prefix + '_' + did + '_b')) || 0;
  });
  const topNet = topD - topY / 3;

  const dEl   = $(prefix + '_top_d');
  const yEl   = $(prefix + '_top_y');
  const bEl   = $(prefix + '_top_b');
  const netEl = $(prefix + '_top_net');
  if (dEl)   dEl.textContent = topD;
  if (yEl)   yEl.textContent = topY;
  if (bEl)   bEl.textContent = topB;
  if (netEl) {
    netEl.textContent = topNet.toFixed(2);
    netEl.style.color = topNet >= 0 ? 'var(--success)' : 'var(--danger)';
  }
}

function gorevDegisti(cb) {
  const parent = cb.closest('.gorev-item');
  if (!parent) return;
  const label = parent.querySelector('.gorev-metin');
  if (!label) return;
  if (cb.checked) label.classList.add('tamamlandi');
  else            label.classList.remove('tamamlandi');
}

function gunTamamlanmaPct(gun) {
  let total = 0, done = 0;
  gun.dersler.forEach(d => {
    d.gorevler.forEach(g => {
      if (g.checkbox) {
        total++;
        const cb = $(g.id);
        if (cb && cb.checked) done++;
      }
    });
  });
  return total > 0 ? Math.round(done / total * 100) : 0;
}

      `<div class="takip-dyb-header-lbl">Y</div>` +
      `<div class="takip-dyb-header-lbl">B</div>` +
      `<div class="takip-dyb-header-lbl">Net</div>` +
    `</div>` +
    `<div class="takip-satirlar">`;

  takipDersler.forEach(d => {
    const renk = RENK_MAP[d.takipKey] || 'var(--text)';
    const ad   = AD_MAP[d.takipKey]  || d.ad;
    const did  = d.takipKey;
    html +=
      `<div class="takip-satir">` +
        `<div class="takip-satir-adi" style="color:${renk}">${esc(ad)}</div>` +
        `<input class="takip-input" type="number" min="0" id="${pid}_${did}_d" placeholder="0" ${dis} aria-label="${esc(ad)} doğru" data-p="${pid}" data-d="${did}" oninput="hesaplaNet(this.dataset.p,this.dataset.d)">` +
        `<input class="takip-input" type="number" min="0" id="${pid}_${did}_y" placeholder="0" ${dis} aria-label="${esc(ad)} yanlış" data-p="${pid}" data-d="${did}" oninput="hesaplaNet(this.dataset.p,this.dataset.d)">` +
        `<input class="takip-input" type="number" min="0" id="${pid}_${did}_b" placeholder="0" ${dis} aria-label="${esc(ad)} boş" data-p="${pid}" data-d="${did}" oninput="hesaplaNet(this.dataset.p,this.dataset.d)">` +
        `<div class="net-goster" id="${pid}_${did}_net" aria-live="polite">—</div>` +
      `</div>`;
  });
  // ── TOPLAM SATIRI ──
  html += `<div class="takip-satir takip-toplam" id="${pid}_toplam_satir" aria-live="polite">` +
    `<div class="takip-satir-adi" style="color:var(--text);font-weight:800">Toplam</div>` +
    `<div class="takip-toplam-val" id="${pid}_top_d">0</div>` +
    `<div class="takip-toplam-val" id="${pid}_top_y">0</div>` +
    `<div class="takip-toplam-val" id="${pid}_top_b">0</div>` +
    `<div class="takip-toplam-val takip-toplam-net" id="${pid}_top_net">0.00</div>` +
  `</div>`;
  html += `</div>`;

  html += `<div class="kp-row">` +
    `<div class="kp-item"><div class="kp-label">Kitap (sayfa)</div>` +
    `<input class="kp-input" type="number" min="0" id="${pid}_kitap" placeholder="0" ${dis} aria-label="Okunan sayfa"></div>` +
    `<div class="kp-item" style="flex:1;min-width:100px"><div class="kp-label">Kitap adı</div>` +
    `<input class="kp-input" style="width:100%;max-width:220px;text-align:left;padding:0 8px" type="text" id="${pid}_kitap_adi" placeholder="Kitabın adı..." ${dis} aria-label="Okunan kitabın adı"></div>` +
    `</div>`;
  html += `<input class="not-input" type="text" id="${pid}_not" placeholder="Bugünkü notun..." ${dis} aria-label="Günlük not">`;

  if (durum === 'aktif') {
    html += `<div class="geri-sayim" id="${pid}_sayim" aria-live="polite">Hesaplanıyor...</div>`;
    html += `<button class="gonder-btn" id="${pid}_btn" data-gun="${esc(gun.ad)}" data-p="${pid}" onclick="gonder(this.dataset.gun,this.dataset.p)">Kaydet</button>`;
  } else if (durum === 'suresi_doldu') {
    html += `<button class="gonder-btn" disabled>Giriş süresi doldu</button>`;
  } else if (durum === 'kilitli') {
    const d2 = gun.tarih.getDate();

function accGunHTML(gun) {
  const durum = gunDurumu(gun);
  let cls = 'acc-item';
  if (durum === 'aktif')         cls += ' aktif acik';
  else if (durum === 'gecmis')   cls += ' gecmis';
  else if (durum === 'kilitli')  cls += ' kilitli';
  else if (durum === 'suresi_doldu') cls += ' gecmis';

  const badgeMap = {
    aktif:        '<span class="gun-durum-badge badge-aktif">Bugün</span>',
    kilitli:      '<span class="gun-durum-badge badge-kilitli">🔒 Bekliyor</span>',
    gecmis:       '<span class="gun-durum-badge badge-gecmis">Geçti</span>',
    suresi_doldu: '<span class="gun-durum-badge badge-gecmis">Doldu</span>'
  };

  const tarihStr = gun.tarih.getDate() + ' ' + gun.tarih.toLocaleString('tr-TR', { month: 'long' });
  const checkIcon = durum === 'gecmis' ? '✓ ' : '';

  let html = `<div class="${cls}" id="acc_${gun.prefix}">` +
    `<div class="acc-header" onclick="accToggle('${gun.prefix}')" role="button" aria-expanded="${durum === 'aktif'}">` +
      `<div>` +
        `<div class="acc-gun-adi">${checkIcon}${esc(gun.ad)}</div>` +
        `<div class="acc-tarih">${tarihStr}</div>` +
        `<div class="acc-soru" id="acc_soru_${gun.prefix}"></div>` +
      `</div>` +
      `<div class="acc-mini-bar"><div class="acc-mini-fill" id="acc_bar_${gun.prefix}" style="width:0%"></div></div>` +
      `<div class="acc-badges">${badgeMap[durum]}</div>` +
      `<div class="acc-chevron">${durum === 'kilitli' ? '' : '▼'}</div>` +
    `</div>` +
    `<div class="acc-body">`;

  if (durum === 'kilitli') {
    const d2 = gun.tarih.getDate();
    const ay = gun.tarih.toLocaleString('tr-TR', { month: 'long' });
    html += `<div class="kilit-overlay" style="padding:20px">Bu gün henüz gelmedi<br>` +
      `<small style="color:#94a3b8">${d2} ${esc(ay)} tarihinde açılacak</small></div>`;
  } else {
    gun.dersler.forEach(d => {
      html += `<div class="ders-blok"><div class="ders-baslik ${esc(d.cls)}">${esc(d.ad)}</div><div class="gorev-list">`;
      d.gorevler.forEach(g => {
        if (g.checkbox) {
          const cbDis = (durum !== 'aktif') ? 'disabled' : '';
          html += `<div class="gorev-item">` +
            `<input type="checkbox" class="gorev-cb" id="${g.id}" ${cbDis}` +
            ` onchange="gorevDegisti(this);accBarGuncelle('${gun.prefix}')">` +
            `<label class="gorev-metin" for="${g.id}">${esc(g.metin)}</label>` +
          `</div>`;
        } else {
          html += `<div class="gorev-item soru-gorev"><span class="gorev-nokta">✦</span><span class="gorev-metin">${esc(g.metin)}</span></div>`;
        }
      });
      html += `</div></div>`;
    });
    html += takipDersleriHTML(gun, durum);
  }

  html += `</div></div>`;
  return html;
}

function accToggle(prefix) {
  const gun = GUNLER.find(g => g.prefix === prefix);
  if (!gun || gunDurumu(gun) === 'kilitli') return;

  const item = $('acc_' + prefix);
  if (!item) return;
  const isAcik = item.classList.contains('acik');

  GUNLER.forEach(g => {
    if (g.prefix === prefix) return;
    const el = $('acc_' + g.prefix);
    if (el) el.classList.remove('acik');
  });

  if (isAcik) item.classList.remove('acik');
  else        item.classList.add('acik');
}

function accSoruGuncelle(prefix) {
  const gun = GUNLER.find(g => g.prefix === prefix);
  if (!gun) return;
  const takipDersler = gun.dersler.filter(d => d.takipKey);
  let toplam = 0;
  takipDersler.forEach(d => {
    const did = d.takipKey;
    const dEl = $(prefix + '_' + did + '_d');
    const yEl = $(prefix + '_' + did + '_y');
    const bEl = $(prefix + '_' + did + '_b');
    toplam += (dEl ? parseInt(dEl.value) || 0 : 0)
            + (yEl ? parseInt(yEl.value) || 0 : 0)
            + (bEl ? parseInt(bEl.value) || 0 : 0);
  });
  const el = $('acc_soru_' + prefix);
  if (el) el.textContent = toplam > 0 ? toplam + ' soru' : '';
}

// Sunucu verisi sadece AKTİF OLMAYAN günler için yazsın
// Aktif gün → kullanıcı yazıyor, ezme yok
function accSoruGuncelleSunucu(gunAdi, toplam) {
  const gun = GUNLER.find(g => g.ad === gunAdi);
  if (!gun) return;
  if (gunDurumu(gun) === 'aktif') return; // race condition koruması
  const el = $('acc_soru_' + gun.prefix);
  if (el && toplam > 0) el.textContent = toplam + ' soru';
}

function accBarGuncelle(prefix) {
  const gun = GUNLER.find(g => g.prefix === prefix);
  if (!gun) return;
  const pct = gunTamamlanmaPct(gun);
  const bar = $('acc_bar_' + prefix);
  if (bar) bar.style.width = pct + '%';
}

$('accordionGunler').innerHTML = GUNLER.map(accGunHTML).join('');

// ═══════════════════════════════════════════════════════════════════
//  TIMER YÖNETİMİ (cleanup ile)
// ═══════════════════════════════════════════════════════════════════

const timerIds = {};

GUNLER.forEach(gun => {
  if (gunDurumu(gun) !== 'aktif') return;

  function guncelle() {
    const kalan = kalanSure(gun);
    const el    = $(gun.prefix + '_sayim');
    const btn   = $(gun.prefix + '_btn');
    if (!el) {
      clearInterval(timerIds[gun.prefix]);
      delete timerIds[gun.prefix];
      return;
    }
    if (!kalan) {
      el.textContent = 'Giriş süresi doldu.';
      if (btn) { btn.disabled = true; btn.textContent = 'Giriş süresi doldu'; }
      clearInterval(timerIds[gun.prefix]);
      delete timerIds[gun.prefix];
      document.querySelectorAll('#acc_' + gun.prefix + ' input, #acc_' + gun.prefix + ' .gorev-cb')
        .forEach(i => { i.disabled = true; });
      return;
    }
    const sure = (kalan.s > 0 ? kalan.s + ' sa ' : '') + kalan.d + ' dk ' + kalan.sn + ' sn';
    el.textContent = 'Son giriş saatine ' + sure + ' kaldı';
    if (kalan.toplam < SON_DAKIKA_MS) el.classList.add('son-dakika');
  }

  guncelle();
  timerIds[gun.prefix] = setInterval(guncelle, TIMER_INTERVAL_MS);
});

// Sayfa kapanırken timer'ları temizle
window.addEventListener('beforeunload', () => {
  Object.values(timerIds).forEach(clearInterval);
});

// ═══════════════════════════════════════════════════════════════════
//  VERİ GÖNDERME
// ═══════════════════════════════════════════════════════════════════

function gonderiBilgisiTopla(gun) {
  const gorevBilgisi = {};
  gun.dersler.forEach(d => {
    if (!d.takipKey || d.takipKey === 'kit') return;
    const cbGorevler = d.gorevler.filter(g => g.checkbox);
    if (!cbGorevler.length) return;
    const tamamlanan = cbGorevler.filter(g => {
      const cb = $(g.id);
      return cb && cb.checked;
    }).length;
    gorevBilgisi[d.takipKey + '_gorev'] = tamamlanan + '/' + cbGorevler.length;
  });
  return gorevBilgisi;
}

function gonder(gunAdi, prefix) {
  const btn     = $(prefix + '_btn');
  const mesajEl = $(prefix + '_mesaj');
  if (!btn || !mesajEl) return;

  btn.disabled    = true;
  btn.textContent = 'Kaydediliyor...';

  const gun          = GUNLER.find(g => g.prefix === prefix);
  const gorevBilgisi = gun ? gonderiBilgisiTopla(gun) : {};

  const konular = [];
  if (gun) {
    gun.dersler.forEach(d => {
      d.gorevler.forEach(g => {
        if (g.checkbox) {
          const cb = $(g.id);
          if (cb && cb.checked) konular.push({
            ders: DERS_GONDERIM_AD[d.takipKey] || d.takipKey,
            konu: g.metin
          });
        }
      });
    });
  }

  // O günde gerçekten var olan dersleri gönder, yoksa 0
  const gunDersleri = gun
    ? gun.dersler.filter(d => d.takipKey).map(d => d.takipKey)
    : [];

  const dersVerisi = {};
  TUM_DERSLER.forEach(k => {
    const varMi = gunDersleri.indexOf(k) !== -1;
    dersVerisi[k+'_d'] = varMi ? val(prefix+'_'+k+'_d') : '0';
    dersVerisi[k+'_y'] = varMi ? val(prefix+'_'+k+'_y') : '0';
    dersVerisi[k+'_b'] = varMi ? val(prefix+'_'+k+'_b') : '0';
  });

  const veri = Object.assign({
    ogrenciAdi: OGRENCI_ADI, haftaNo: HAFTA_NO, gun: gunAdi,
    kitap:     val(prefix+'_kitap'),
    kitap_adi: strVal(prefix+'_kitap_adi'),
    not:       strVal(prefix+'_not'),
    konular: konular
  }, dersVerisi, gorevBilgisi);

  fetch(SCRIPT_URL, {
    method:  'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body:    JSON.stringify(veri)
  })
  .then(r => {
    if (!r.ok) throw new Error('HTTP ' + r.status);
    return r.json();
  })
  .then(data => {
    if (data.durum !== 'ok' && data.durum !== 'basarili') {
      throw new Error(data.mesaj || 'Sunucu hatası');
    }
    mesajEl.textContent  = rastgele(MOTIVASYON_MESAJLARI);
    mesajEl.className    = 'gonder-mesaj mesaj-ok';
    mesajEl.style.display = 'block';
    btn.textContent = 'Güncelle ✓';
    btn.classList.add('tamamlandi');
    btn.disabled = false;
    lsKaydet();
    setTimeout(yukleOzet, OZET_GECIKME_MS);

    if (gunAdi === SON_GUN_ADI) {
      setTimeout(() => {
        fetch(SCRIPT_URL + '?ogrenciAdi=' + encodeURIComponent(OGRENCI_ADI) + '&haftaNo=' + encodeURIComponent(HAFTA_NO))
          .then(r => r.json())
          .then(data => {
            if (data.durum === 'basarili' && data.gunler && data.gunler.length) {
              gosterHaftaOzetiPopup(data.gunler);
            }
          })
          .catch(err => warn('Hafta özeti yüklenemedi:', err));
      }, POPUP_GECIKME_MS);
    }
  })
  .catch(err => {
    warn('Gönderim hatası:', err);
    mesajEl.textContent   = 'Gönderilemedi: ' + err.message + ' — tekrar dene.';
    mesajEl.className     = 'gonder-mesaj mesaj-hata';
    mesajEl.style.display = 'block';
    btn.disabled          = false;
    btn.textContent       = 'Tekrar Dene';
  });
}

// ═══════════════════════════════════════════════════════════════════
//  LOCAL STORAGE
// ═══════════════════════════════════════════════════════════════════

function lsKaydet() {
  GUNLER.forEach(gun => {
    TUM_DERSLER.forEach(ders => {
      ['d','y','b'].forEach(tip => {
        const el = $(gun.prefix + '_' + ders + '_' + tip);
        if (el && !el.disabled) LS.set(LS_PREFIX + gun.prefix + '_' + ders + '_' + tip, el.value);
      });
    });
    const kitap = $(gun.prefix + '_kitap');
    if (kitap && !kitap.disabled) LS.set(LS_PREFIX + gun.prefix + '_kitap', kitap.value);
    const kitapAdi = $(gun.prefix + '_kitap_adi');
    if (kitapAdi && !kitapAdi.disabled) LS.set(LS_PREFIX + gun.prefix + '_kitap_adi', kitapAdi.value);
    const not = $(gun.prefix + '_not');
    if (not && !not.disabled) LS.set(LS_PREFIX + gun.prefix + '_not', not.value);

    gun.dersler.forEach(d => {
      d.gorevler.forEach(g => {
        if (g.checkbox) {
          const cb = $(g.id);
          if (cb && !cb.disabled) LS.set(LS_PREFIX + 'cb_' + g.id, cb.checked ? '1' : '0');
        }
      });
    });
  });
}

let _lsTimer;
function lsKaydetDebounced() {
  clearTimeout(_lsTimer);
  _lsTimer = setTimeout(lsKaydet, LS_DEBOUNCE_MS);
}

function lsYukle() {
  GUNLER.forEach(gun => {
    TUM_DERSLER.forEach(ders => {
      ['d','y','b'].forEach(tip => {
        const el = $(gun.prefix + '_' + ders + '_' + tip);
        if (el && !el.disabled) {
          const v = LS.get(LS_PREFIX + gun.prefix + '_' + ders + '_' + tip);
          if (v !== null && v !== '') { el.value = v; hesaplaNet(gun.prefix, ders); }
        }
      });
    });
    const kitap = $(gun.prefix + '_kitap');
    if (kitap && !kitap.disabled) {
      const kv = LS.get(LS_PREFIX + gun.prefix + '_kitap');
      if (kv !== null) kitap.value = kv;
    }
    const kitapAdi = $(gun.prefix + '_kitap_adi');
    if (kitapAdi && !kitapAdi.disabled) {
      const kav = LS.get(LS_PREFIX + gun.prefix + '_kitap_adi');
      if (kav !== null) kitapAdi.value = kav;
    }
    const not = $(gun.prefix + '_not');
    if (not && !not.disabled) {
      const nv = LS.get(LS_PREFIX + gun.prefix + '_not');
      if (nv !== null) not.value = nv;
    }
    gun.dersler.forEach(d => {
      d.gorevler.forEach(g => {
        if (g.checkbox) {
          const cb = $(g.id);
          if (cb && !cb.disabled) {
            const cv = LS.get(LS_PREFIX + 'cb_' + g.id);
            if (cv !== null) {
              cb.checked = (cv === '1');
              const label = document.querySelector('label[for="' + g.id + '"]');
              if (label) {
                if (cb.checked) label.classList.add('tamamlandi');
                else            label.classList.remove('tamamlandi');
              }
            }
          }
        }
      });
    });
    accBarGuncelle(gun.prefix);
    accSoruGuncelle(gun.prefix);
    guncelleToplam(gun.prefix);
  });
}

function lsDinleyiciEkle() {
  document.querySelectorAll('.takip-input, .kp-input, .not-input').forEach(el => {
    el.addEventListener('input', lsKaydetDebounced);
    el.addEventListener('input', function() {
      const parts = (this.id || '').split('_');
      if (parts.length >= 2) accSoruGuncelle(parts[0]);
    });
  });
  document.querySelectorAll('.gorev-cb').forEach(el => {
    el.addEventListener('change', lsKaydetDebounced);
  });
}

// ═══════════════════════════════════════════════════════════════════
//  CROSS-DEVICE SYNC — Sunucudan gelen veriyi forma yaz
//  AKTİF gün hariç (kullanıcı yazıyor olabilir)
// ═══════════════════════════════════════════════════════════════════

function sunucudanFormaYaz(gunler) {
  if (!gunler || !gunler.length) return;
  gunler.forEach(g => {
    const gun = GUNLER.find(x => x.ad === g.gun);
    if (!gun) return;
    if (gunDurumu(gun) === 'aktif') return; // aktif günü ezme

    const prefix = gun.prefix;
    TUM_DERSLER.forEach(k => {
      ['d','y','b'].forEach(tip => {
        const el = $(prefix + '_' + k + '_' + tip);
        const sv = g[k + '_' + tip];
        if (el && sv !== undefined && Number(sv) > 0) {
          el.value = sv;
          if (tip === 'd' || tip === 'y') hesaplaNet(prefix, k);
        }
      });
    });
    const kitapEl = $(prefix + '_kitap');
    if (kitapEl && Number(g.kitap) > 0) kitapEl.value = g.kitap;
    const kitapAdiEl = $(prefix + '_kitap_adi');
    if (kitapAdiEl && g.kitap_adi) kitapAdiEl.value = g.kitap_adi;
    const notEl = $(prefix + '_not');
    if (notEl && g.not) notEl.value = g.not;
  });
}

function sunucudanCheckboxYaz(konular) {
  if (!konular || !konular.length) return;
  // Konu metni → checkbox eşle
  konular.forEach(k => {
    const gun = GUNLER.find(x => x.ad === k.gun);
    if (!gun) return;
    if (gunDurumu(gun) === 'aktif') return;

    gun.dersler.forEach(d => {
      d.gorevler.forEach(g => {
        if (g.checkbox && g.metin === k.konu) {
          const cb = $(g.id);
          if (cb) {
            cb.checked = true;
            const label = document.querySelector('label[for="' + g.id + '"]');
            if (label) label.classList.add('tamamlandi');
          }
        }
      });
    });
    accBarGuncelle(gun.prefix);
  });
}

// ═══════════════════════════════════════════════════════════════════
//  HAFTALIK ÖZET TABLOSU
// ═══════════════════════════════════════════════════════════════════

const OZET_DERSLER = [
  { key:'mat', ad:'Mat',      renk:'var(--mat)' },
  { key:'fen', ad:'Fen',      renk:'var(--fen)' },
  { key:'tur', ad:'Türkçe',   renk:'var(--tur)' },
  { key:'ing', ad:'İng',      renk:'var(--ing)' },
  { key:'sos', ad:'Sosyal',   renk:'var(--sos)' },
  { key:'din', ad:'Din',      renk:'var(--din)' },
  { key:'par', ad:'Paragraf', renk:'var(--par)' },
];

function basariOku(d, y, b) {
  const total = d + y + b;
  if (total === 0) return '';
  const pct = d / total * 100;
  if (pct >= 90) return '<span style="color:#15803d;font-size:13px;font-weight:900;margin-left:3px;vertical-align:middle">▲</span>';
  if (pct >= 70) return '<span style="display:inline-block;width:14px;height:4px;background:#f59e0b;border-radius:3px;vertical-align:middle;margin-left:4px;margin-bottom:1px"></span>';
  return '<span style="color:var(--danger);font-size:13px;font-weight:900;margin-left:3px;vertical-align:middle">▼</span>';
}

function renderOzetTablo(gunler) {
  const el = $('haftalikOzetIcerik');
  if (!el) return;
  if (!gunler || !gunler.length) {
    el.innerHTML = '<div class="ozet-bos">Henüz bu haftaya ait kayıt yok.</div>';
    return;
  }

  let html = '<div style="overflow-x:auto"><table class="ozet-tablo"><thead><tr><th>Gün</th>';
  OZET_DERSLER.forEach(d => { html += `<th style="color:${d.renk}">${d.ad}</th>`; });
  html += '<th style="color:var(--kit)">Kitap</th><th style="color:var(--mat);border-left:2px solid var(--border)">Günlük</th></tr></thead><tbody>';

  let toplamSoru = 0;
  let toplamKitap = 0;
  const dersToplam = {};
  OZET_DERSLER.forEach(d => { dersToplam[d.key] = {d:0, y:0, b:0}; });

  gunler.forEach(g => {
    html += `<tr><td>${esc(g.gun || '—')}</td>`;
    OZET_DERSLER.forEach(d => {
      const dv = Number(g[d.key+'_d'])||0, yv = Number(g[d.key+'_y'])||0, bv = Number(g[d.key+'_b'])||0;
      const total = dv + yv + bv;
      toplamSoru += total;
      dersToplam[d.key].d += dv;
      dersToplam[d.key].y += yv;
      dersToplam[d.key].b += bv;
      if (!total) {
        html += '<td class="ozet-net-yok">—</td>';
      } else {
        const net  = dv - yv / 3;
        const renk = net >= 0 ? d.renk : 'var(--danger)';
        html += `<td style="color:${renk}">${net.toFixed(1)}${basariOku(dv, yv, bv)}` +
          `<span style="font-size:10px;color:var(--muted);font-weight:400"> (${total})</span></td>`;
      }
    });
    const kitap = g.kitap && g.kitap > 0 ? g.kitap : 0;
    toplamKitap += kitap;
    html += `<td style="color:var(--kit)">${kitap > 0 ? kitap + ' s.' : '—'}</td>`;
    const gunSoru = OZET_DERSLER.reduce((acc, d) => {
      return acc + Number(g[d.key+'_d']||0) + Number(g[d.key+'_y']||0) + Number(g[d.key+'_b']||0);
    }, 0);
    html += `<td style="font-weight:800;color:var(--mat);font-size:13px;border-left:2px solid var(--border);text-align:center">${gunSoru > 0 ? gunSoru : '—'}</td></tr>`;
  });

  // TOPLAM SATIRI
  html += '<tr style="border-top:2px solid var(--mat)">';
  html += '<td style="font-size:11px;font-weight:800;color:var(--mat);letter-spacing:0.06em;text-transform:uppercase">Toplam</td>';
  OZET_DERSLER.forEach(d => {
    const dv = dersToplam[d.key].d, yv = dersToplam[d.key].y, bv = dersToplam[d.key].b;
    const total = dv + yv + bv;
    if (!total) {
      html += '<td class="ozet-net-yok">—</td>';
    } else {
      const net  = dv - yv / 3;
      const renk = net >= 0 ? d.renk : 'var(--danger)';
      html += `<td style="color:${renk};font-size:13px;font-weight:800">${net.toFixed(1)}` +
        `<span style="font-size:10px;color:var(--muted);font-weight:400"> (${total})</span></td>`;
    }
  });
  html += `<td style="color:var(--kit);font-weight:800">${toplamKitap > 0 ? toplamKitap + ' s.' : '—'}</td>`;
  html += `<td style="font-weight:800;color:var(--mat);font-size:13px;border-left:2px solid var(--border);text-align:center">${toplamSoru}</td>`;
  html += '</tr>';
  html += '</tbody></table></div>';

  // Kötü dersler
  const OZET_ADI = {mat:'Matematik', fen:'Fen', tur:'Türkçe', ing:'İngilizce', sos:'Sosyal', din:'Din', par:'Paragraf'};
  const kotuDersler = [];
  OZET_DERSLER.forEach(d => {
    let totD = 0, totY = 0, totB = 0;
    gunler.forEach(g => {
      totD += Number(g[d.key+'_d'])||0;
      totY += Number(g[d.key+'_y'])||0;
      totB += Number(g[d.key+'_b'])||0;
    });
    const tot = totD + totY + totB;
    if (tot > 5) {
      const pct = Math.round(totD / tot * 100);
      if (pct < 70) kotuDersler.push(`<span style="color:${d.renk};font-weight:700">${OZET_ADI[d.key]}</span> <span style="color:#991b1b;background:#fee2e2;border-radius:4px;padding:1px 5px;font-size:11px">%${pct} ▼</span>`);
    }
  });
  const kotuHtml = kotuDersler.length ? '&nbsp;·&nbsp; ⚠️ Dikkat: ' + kotuDersler.join(' &nbsp; ') : '';

  html += `<div style="margin-top:10px;font-size:12px;color:var(--muted);font-weight:600;display:flex;flex-wrap:wrap;gap:4px;align-items:center">` +
    `<span>📊 ${gunler.length} gün kayıtlı &nbsp;·&nbsp; ✏️ Toplam ${toplamSoru} soru${kotuHtml}</span>` +
    `</div>`;
  el.innerHTML = html;
}

function yukleOzet() {
  fetch(SCRIPT_URL + '?ogrenciAdi=' + encodeURIComponent(OGRENCI_ADI) + '&haftaNo=' + encodeURIComponent(HAFTA_NO))
    .then(r => r.json())
    .then(data => {
      if (data.durum !== 'basarili') {
        $('haftalikOzetIcerik').innerHTML = '<div class="ozet-bos">Veri alınamadı.</div>';
        return;
      }
      const gunler = data.gunler || [];
      renderOzetTablo(gunler);
      renderStatsKart(gunler);

      // Cross-device sync — formdaki AKTİF OLMAYAN günlere yaz
      sunucudanFormaYaz(gunler);
      sunucudanCheckboxYaz(data.konular || []);

      // Accordion başlıklarına soru sayısı yaz (AKTİF olmayan günler için)
      gunler.forEach(g => {
        const toplam = TUM_DERSLER.reduce((acc, k) => {
          return acc + (Number(g[k+'_d'])||0) + (Number(g[k+'_y'])||0) + (Number(g[k+'_b'])||0);
        }, 0);
        accSoruGuncelleSunucu(g.gun, toplam);
      });
    })
    .catch(err => {
      warn('Özet yüklenemedi:', err);
      $('haftalikOzetIcerik').innerHTML = '<div class="ozet-bos">Bağlantı hatası — sayfayı yenile.</div>';
    });
}

function hesaplaHaftaOzeti(gunler) {
  let toplamSoru = 0, toplamKitap = 0, toplamParagraf = 0;
  const dersToplam    = { mat:0, fen:0, tur:0, ing:0, sos:0, din:0 };
  const dersGunSayisi = { mat:0, fen:0, tur:0, ing:0, sos:0, din:0 };
  let enIyiGun = null, enIyiSoru = -1;

  gunler.forEach(g => {
    let gunSoru = 0;
    ANA_DERSLER.forEach(d => {
      const net  = (Number(g[d+'_d'])||0) - (Number(g[d+'_y'])||0) / 3;
      const soru = (Number(g[d+'_d'])||0) + (Number(g[d+'_y'])||0) + (Number(g[d+'_b'])||0);
      if (soru > 0) { dersToplam[d] += net; dersGunSayisi[d]++; gunSoru += soru; }
    });
    toplamParagraf += Number(g.par_d || 0) + Number(g.par_y || 0) + Number(g.par_b || 0);
    gunSoru        += Number(g.par_d || 0) + Number(g.par_y || 0) + Number(g.par_b || 0);
    toplamSoru += gunSoru;
    toplamKitap+= Number(g.kitap) || 0;
    if (gunSoru > enIyiSoru) { enIyiSoru = gunSoru; enIyiGun = g.gun; }
  });

  const dersNetleri = {};
  Object.keys(dersToplam).forEach(d => {
    dersNetleri[d] = dersGunSayisi[d] > 0 ? (dersToplam[d] / dersGunSayisi[d]).toFixed(1) : null;
  });
  return { toplamSoru, toplamKitap, toplamParagraf, dersNetleri, enIyiGun, enIyiSoru };
}

        `<div style="text-align:center;padding:10px 6px;border-radius:12px;background:#fefce8;border:2px solid #fde68a"><div style="font-size:24px;font-weight:900;color:#b45309">${ozet.toplamParagraf}</div><div style="font-size:11px;font-weight:700;color:#64748b">paragraf</div></div>` +

function renderStatsKart(gunlerData) {
  const d = CONFIG.durum;
  const DERS = [
    {k:'mat', n:'Mat', c:'#2563eb', max:20},
    {k:'fen', n:'Fen', c:'#16a34a', max:20},
    {k:'tur', n:'Tür', c:'#9333ea', max:15},
    {k:'sos', n:'Sos', c:'#0891b2', max:10},
    {k:'ing', n:'İng', c:'#d97706', max:10},
    {k:'din', n:'Din', c:'#be185d', max:10},
  ];
  const bars = DERS.map(d2 => {
    const ort = d.netler[d2.k] ? d.netler[d2.k].ort : 0;
    if (!ort) return '';
    const pct = Math.min(ort / d2.max * 100, 100);
    return `<div class="stats-bar-row">` +
      `<span style="font-size:10px;font-weight:700;color:var(--muted);width:22px">${d2.n}</span>` +
      `<div style="flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden">` +
        `<div style="height:100%;width:${pct}%;background:${d2.c};border-radius:3px"></div>` +
      `</div>` +
      `<span style="font-size:11px;font-weight:800;color:${d2.c};width:28px;text-align:right">${ort.toFixed(1)}</span>` +
    `</div>`;
  }).join('');

  const GUN_ADL = ['Pazartesi','Salı','Çarşamba','Perşembe','Cuma','Cumartesi'];
  const GUN_KSA = ['Pt','Sa','Ça','Pe','Cu','Ct'];
  const calisildi = {};
  (gunlerData || []).forEach(g => { calisildi[g.gun] = true; });
  const dots = GUN_ADL.map((a, i) => {
    const on = !!calisildi[a];
    return `<div class="stats-gun-dot ${on ? 'stats-gun-on' : 'stats-gun-off'}">${GUN_KSA[i]}</div>`;
  }).join('');

  let toplamSoruHafta = 0, toplamKitapHafta = 0, enIyiGunAd = '—', enIyiGunSoru = 0;
  (gunlerData || []).forEach(g => {
    const gs = TUM_DERSLER.reduce((a,k) => a + (Number(g[k+'_d'])||0) + (Number(g[k+'_y'])||0) + (Number(g[k+'_b'])||0), 0);
    toplamSoruHafta += gs;
    toplamKitapHafta += Number(g.kitap)||0;
    if (gs > enIyiGunSoru) { enIyiGunSoru = gs; enIyiGunAd = g.gun || '—'; }
  });

  const el = $('stats-kart');
  if (!el) return;
  el.innerHTML =
    `<div class="stats-kart">` +
      `<div style="font-size:10px;font-weight:800;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);margin-bottom:10px">📊 Ders Ortalama Netleri</div>` +
      bars +
      `<div style="margin-top:12px;padding-top:12px;border-top:1.5px solid var(--border)">` +
        `<div style="font-size:10px;font-weight:800;letter-spacing:0.07em;text-transform:uppercase;color:var(--muted);margin-bottom:8px">📅 Bu Haftanın Özeti</div>` +
        `<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:10px">` +
          `<div class="stats-skor"><div class="stats-skor-val" style="color:#2563eb">${toplamSoruHafta}</div><div class="stats-skor-lbl">Soru</div></div>` +
          `<div class="stats-skor"><div class="stats-skor-val" style="color:#16a34a">${toplamKitapHafta}</div><div class="stats-skor-lbl">Sayfa</div></div>` +
          `<div class="stats-skor"><div class="stats-skor-val" style="color:#9333ea;font-size:13px">${esc(enIyiGunAd.substring(0,2)||'—')}</div><div class="stats-skor-lbl">En İyi</div></div>` +
        `</div>` +
      `</div>` +
      `<div style="font-size:10px;font-weight:800;letter-spacing:0.07em;text-transform:uppercase;color:var(--muted);margin-bottom:8px">📬 Rapor Gönderilen Günler</div>` +
      `<div class="stats-gun-dots">${dots}</div>` +
    `</div>`;
}

lsYukle();
lsDinleyiciEkle();
yukleOzet();

  if (gunDurumu(g) === 'aktif') accSoruGuncelle(g.prefix);
});
